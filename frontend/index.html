<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — AI Smart Food OS</title>
    <meta name="description" content="Discover AI-powered food recommendations tuned to your mood, budget, and body.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&family=Outfit:wght@400;500;700&family=Plus+Jakarta+Sans:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    
    <!-- React via CDN -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <!-- NAVBAR -->
    <nav class="navbar">
        <div class="container">
            <a href="/index.html" class="nav-logo" id="nav-logo">
                <div class="logo-icon">🍴</div>
                AI Food <span class="logo-accent">OS</span>
            </a>

            <div class="nav-links">
                <a href="/index.html" id="nav-home" class="active">Home</a>
                <a href="/menu.html" id="nav-menu">Menu</a>
                <a href="/health.html" id="nav-health">Health</a>
                <a href="/orders.html" id="nav-orders">Orders</a>
                <a href="/profile.html" id="nav-profile">Profile</a>
            </div>

            <div class="nav-actions">
                <button class="btn-icon-circle" id="nav-settings-btn" onclick="location.href='/settings.html'" title="Settings">⚙</button>
                <button class="btn-icon-circle" id="theme-toggle" title="Toggle Theme">🌓</button>
                <div class="btn-pro" id="nav-pro-badge" onclick="location.href='/profile.html#pricing'" style="cursor: pointer;">⚡ PRO</div>
                <div class="wallet-pill" id="nav-wallet-pill" onclick="location.href='/profile.html'" style="cursor: pointer;">
                    <span>💳</span>
                    <span id="nav-wallet-balance">–</span>
                </div>
                <button class="btn-icon-circle" id="nav-logout-btn" onclick="logout()" title="Sign out" style="color: var(--on-surface);">⏻</button>
            </div>
        </div>
    </nav>

    <!-- REACT MOUNT POINT -->
    <main id="react-dashboard-root"></main>

    <!-- GLOBAL SCRIPTS -->
    <script>
        const API_BASE = 'http://localhost:8000';
        
        async function logout() {
            try { await fetch(API_BASE + '/api/auth/signout', { method: 'POST' }); } catch(e) {}
            window.location.href = '/landing.html';
        }

        async function loadNavInfo() {
            try {
                const r = await fetch(API_BASE + '/api/profile');
                if (r.ok) {
                    const data = await r.json();
                    const bal = data.wallet_balance || 0;
                    document.getElementById('nav-wallet-balance').textContent = '₹' + parseFloat(bal).toFixed(0);
                    const proBadge = document.getElementById('nav-pro-badge');
                    if (data.subscription_tier === 'free') {
                        proBadge.textContent = '⚡ Upgrade';
                        proBadge.style.background = 'var(--surface-highest)';
                        proBadge.style.color = 'var(--on-surface)';
                    } else {
                        proBadge.textContent = '⚡ PRO';
                        proBadge.style.background = 'var(--accent-pro)';
                        proBadge.style.color = '#000';
                    }
                }
            } catch(e) {}
        }

        // Theme Toggle Logic
        const themeToggle = document.getElementById('theme-toggle');
        const body = document.body;
        
        // Check for saved theme
        if (localStorage.getItem('theme') === 'dark') {
            body.classList.add('dark-mode');
        }

        themeToggle.addEventListener('click', () => {
            body.classList.toggle('dark-mode');
            const mode = body.classList.contains('dark-mode') ? 'dark' : 'light';
            localStorage.setItem('theme', mode);
        });

        document.addEventListener('DOMContentLoaded', loadNavInfo);
    </script>

    <!-- REACT DASHBOARD COMPONENT -->
    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        function DashboardApp() {
            const [foods, setFoods] = useState([]);
            const [loading, setLoading] = useState(true);
            
            // Filters
            const [activeMood, setActiveMood] = useState('');
            const [emergencyMode, setEmergencyMode] = useState(false);

            useEffect(() => {
                fetchFoods();
            }, [activeMood, emergencyMode]);

            async function fetchFoods() {
                setLoading(true);
                try {
                    let url = 'http://localhost:8000/api/recommend?';
                    if (activeMood) url += `mood=${activeMood}&`;
                    if (emergencyMode) url += `budget=80&`;
                    const res = await fetch(url);
                    const data = await res.json();
                    setFoods(data);
                } catch(e) {
                    console.error("Error fetching foods", e);
                }
                setLoading(false);
            }

            const moods = [
                { id: 'happy', emoji: '😊', label: 'Feel Good' },
                { id: 'stressed', emoji: '😫', label: 'Stressed / Comfort' },
                { id: 'tired', emoji: '🥱', label: 'Energy Boost' },
                { id: 'gym', emoji: '💪', label: 'Post-Workout' },
                { id: 'lazy', emoji: '🛋️', label: 'Lazy / Easy' },
                { id: 'adventurous', emoji: '🌶️', label: 'Adventurous' }
            ];

            const stats = useMemo(() => {
                if(!foods.length) return { totalFoods: 12, avgHealth: 81 };
                return {
                    totalFoods: foods.length,
                    avgHealth: Math.round(foods.reduce((acc, f) => acc + (f.health_score || 0), 0) / foods.length)
                };
            }, [foods]);

            return (
                <div className="dashboard-root">
                    {/* HERO SECTION */}
                    <section className="hero">
                        <div className="hero-ambient"></div>
                        <div className="container">
                            <div className="hero-grid">
                                <div className="hero-content">
                                    <div className="hero-tag">
                                        <div className="hero-tag-dot"></div>
                                        AI Intelligence System · Live
                                    </div>

                                    <h1 className="hero-title">
                                        Think. Eat.<br/>
                                        <span className="accent-green">Thrive.</span>
                                    </h1>

                                    <p className="hero-subtitle">
                                        The world's first AI food intelligence OS. Not just ordering — 
                                        understanding <em>what, why &amp; how much</em> to eat based on your body, mood and budget.
                                    </p>

                                    <div className="hero-actions">
                                        <button className="btn btn-primary btn-hero" onClick={() => location.href='/menu.html'}>
                                            <span style={{marginRight: '12px'}}>🍽️</span> Explore AI Menu
                                        </button>
                                    </div>

                                    <div className="hero-stats">
                                        <div className="stat-item">
                                            <div className="hero-stat-val">{stats.totalFoods}+</div>
                                            <div className="hero-stat-label">Recommendations</div>
                                        </div>
                                        <div className="stat-item">
                                            <div className="hero-stat-val">97%</div>
                                            <div className="hero-stat-label">Health Accuracy</div>
                                        </div>
                                        <div className="stat-item">
                                            <div className="hero-stat-val">{stats.avgHealth}</div>
                                            <div className="hero-stat-label">Avg Health Score</div>
                                        </div>
                                    </div>
                                </div>
                                
                                <div className="hero-visual">
                                    <div className="hero-img-wrap">
                                        <img src="/static/img/hero_food_platter.png" alt="AI Food Intelligence" className="hero-img" />
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* BIOLOGICAL STATE SELECTOR */}
                    <section className="section-sm">
                        <div className="container">
                            <div className="section-header">
                                <span className="section-tag">Biological State Selector</span>
                                <h2 className="section-title">How are you feeling right now?</h2>
                            </div>

                            <div className="mood-pills">
                                {moods.map(mood => (
                                    <button 
                                        key={mood.id} 
                                        className={`mood-pill ${activeMood === mood.id ? 'active' : ''}`}
                                        onClick={() => setActiveMood(activeMood === mood.id ? '' : mood.id)}
                                    >
                                        <span>{mood.emoji}</span>
                                        <span>{mood.label}</span>
                                    </button>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* AI RECOMMENDED FUEL */}
                    <section className="section">
                        <div className="container">
                            <div className="section-header-row">
                                <div>
                                    <span className="section-tag">AI Recommended Fuel</span>
                                    <h2 className="section-title">{activeMood ? `Optimized for your state` : 'Popular Near You'}</h2>
                                </div>
                                <div className="section-actions">
                                    <button 
                                        className={`btn btn-emergency ${emergencyMode ? 'active' : ''}`} 
                                        onClick={() => setEmergencyMode(!emergencyMode)}
                                    >
                                        🆘 Emergency Mode
                                    </button>
                                    <button className="btn btn-ghost" onClick={() => location.href='/menu.html'}>
                                        See All Menu →
                                    </button>
                                </div>
                            </div>

                            {loading ? (
                                <div className="grid-auto">
                                    {[...Array(4)].map((_, i) => (
                                        <div key={i} className="food-card skeleton-card"></div>
                                    ))}
                                </div>
                            ) : (
                                <div className="grid-auto">
                                    {foods.map(food => (
                                        <div key={food.id} className="food-card">
                                            <div 
                                                className="food-card-img" 
                                                style={{ backgroundImage: `url(${food.image_url || '/static/img/placeholder.png'})`, backgroundSize: 'cover', backgroundPosition: 'center' }}
                                            >
                                                {food.health_score >= 80 && (
                                                    <div className="food-badge">✨ AI Pick</div>
                                                )}
                                                <div className={`diet-indicator ${food.is_veg ? 'veg' : 'non-veg'}`}></div>
                                            </div>
                                            
                                            <div className="food-card-body">
                                                <div className="food-card-header">
                                                    <h3 className="food-title">{food.name}</h3>
                                                    <div className="food-price">₹{food.price}</div>
                                                </div>

                                                <div className="health-ring-wrap">
                                                    <div 
                                                        className="health-ring"
                                                        style={{ 
                                                            '--pct': `${food.health_score * 3.6}deg`,
                                                            '--score-color': food.health_score >= 70 ? 'var(--secondary)' : food.health_score >= 40 ? '#FFD700' : 'var(--error)'
                                                        }}
                                                    >
                                                        <span>{food.health_score}</span>
                                                    </div>
                                                    <div className="health-info">
                                                        <div className="health-label">HEALTH</div>
                                                        <div className="health-status" style={{color: food.health_score >= 70 ? 'var(--secondary)' : food.health_score >= 40 ? '#f59e0b' : 'var(--error)'}}>
                                                            {food.health_score >= 70 ? 'Excellent' : food.health_score >= 40 ? 'Moderate' : 'Caution'}
                                                        </div>
                                                    </div>
                                                    
                                                    {food.true_cost > 0 && (
                                                        <div className="cost-to-create">
                                                            <div className="cost-label">COST TO CREATE</div>
                                                            <div className="cost-val">~₹{food.true_cost}</div>
                                                        </div>
                                                    )}
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                    </section>
                </div>
            )
        }

        const root = ReactDOM.createRoot(document.getElementById('react-dashboard-root'));
        root.render(<DashboardApp />);
    </script>
    <!-- AI CHATBOT -->
    <script src="/static/js/ChatWidget.js" type="text/babel"></script>
</body>
</html>
