<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order History — AI Smart Food OS</title>
    <meta name="description" content="View your order history and health insights.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&family=Outfit:wght@400;500;700&family=Plus+Jakarta+Sans:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    
    <!-- React via CDN -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <!-- NAVBAR -->
    <nav class="navbar">
        <div class="container">
            <a href="/index.html" class="nav-logo" id="nav-logo">
                <div class="logo-icon">🍴</div>
                AI Food <span class="logo-accent">OS</span>
            </a>

            <div class="nav-links">
                <a href="/index.html" id="nav-home">Home</a>
                <a href="/menu.html" id="nav-menu">Menu</a>
                <a href="/health.html" id="nav-health">Health</a>
                <a href="/orders.html" id="nav-orders" class="active">Orders</a>
                <a href="/profile.html" id="nav-profile">Profile</a>
            </div>

            <div class="nav-actions">
                <button class="btn-icon-circle" id="nav-settings-btn" onclick="location.href='/settings.html'" title="Settings">⚙</button>
                <button class="btn-icon-circle" id="theme-toggle" title="Toggle Theme">🌓</button>
                <div class="btn-pro" id="nav-pro-badge" onclick="location.href='/profile.html#pricing'" style="cursor: pointer;">⚡ PRO</div>
                <div class="wallet-pill" id="nav-wallet-pill" onclick="location.href='/profile.html'" style="cursor: pointer;">
                    <span>💳</span>
                    <span id="nav-wallet-balance">–</span>
                </div>
                <button class="btn-icon-circle" id="nav-logout-btn" onclick="logout()" title="Sign out" style="color: var(--on-surface);">⏻</button>
            </div>
        </div>
    </nav>

    <!-- REACT MOUNT POINT -->
    <main id="react-orders-root"></main>

    <!-- GLOBAL SCRIPTS -->
    <script>
        const API_BASE = 'http://localhost:8000';
        
        async function logout() {
            try { await fetch(API_BASE + '/api/auth/signout', { method: 'POST' }); } catch(e) {}
            window.location.href = '/landing.html';
        }

        async function loadNavInfo() {
            try {
                const r = await fetch(API_BASE + '/api/profile');
                if (r.ok) {
                    const data = await r.json();
                    const bal = data.wallet_balance || 0;
                    document.getElementById('nav-wallet-balance').textContent = '₹' + parseFloat(bal).toFixed(0);
                    const proBadge = document.getElementById('nav-pro-badge');
                    if (data.subscription_tier === 'free') {
                        proBadge.textContent = '⚡ Upgrade';
                        proBadge.style.background = 'var(--surface-highest)';
                        proBadge.style.color = 'var(--on-surface)';
                    } else {
                        proBadge.textContent = '⚡ PRO';
                        proBadge.style.background = 'var(--accent-pro)';
                        proBadge.style.color = '#000';
                    }
                }
            } catch(e) {}
        }

        // Theme Toggle Logic
        const themeToggle = document.getElementById('theme-toggle');
        const body = document.body;
        if (localStorage.getItem('theme') === 'dark') body.classList.add('dark-mode');
        themeToggle.addEventListener('click', () => {
            body.classList.toggle('dark-mode');
            localStorage.setItem('theme', body.classList.contains('dark-mode') ? 'dark' : 'light');
        });

        document.addEventListener('DOMContentLoaded', loadNavInfo);
    </script>

    <!-- REACT ORDERS COMPONENT -->
    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        function OrdersApp() {
            const [orders, setOrders] = useState([]);
            const [loading, setLoading] = useState(true);
            const [statusFilter, setStatusFilter] = useState('');
            const [searchQuery, setSearchQuery] = useState('');
            const [sortBy, setSortBy] = useState('newest');
            const [expandedOrder, setExpandedOrder] = useState(null);
            const [receiptOrder, setReceiptOrder] = useState(null);

            useEffect(() => {
                fetchOrders();
            }, []);

            async function fetchOrders() {
                try {
                    const r = await fetch('http://localhost:8000/api/orders');
                    if (r.ok) {
                        const d = await r.json();
                        setOrders(d);
                    } else {
                        throw new Error('Failed');
                    }
                } catch(e) {
                    const statuses = ['delivered', 'delivered', 'placed', 'cancelled', 'delivered'];
                    const moods = ['happy', 'stressed', 'gym', 'lazy', 'adventurous'];
                    const dummy = Array.from({ length: 8 }, (_, i) => ({
                        id: 'ord-' + Math.random().toString(36).slice(2, 10),
                        amount: Math.round(Math.random() * 300 + 80),
                        status: statuses[i % statuses.length],
                        mood: moods[i % moods.length],
                        created_at: new Date(Date.now() - i * 86400000 * 2).toISOString(),
                        delivery_boy_name: ['Rohan Kumar', 'Aakash Singh', 'Priya Sharma'][i % 3],
                        avg_health_score: Math.round(Math.random() * 50 + 40),
                        payment_method: ['upi', 'card', 'wallet'][i % 3],
                        delivery_address: '402 Skyline Towers, Bandra West, Mumbai',
                        items: [
                            { name: 'Grilled Chicken Bowl', qty: 1, price: 220 },
                            { name: 'Mango Lassi', qty: 2, price: 60 }
                        ],
                        rated: i % 2 === 0
                    }));
                    setOrders(dummy);
                }
                setLoading(false);
            }

            const filteredOrders = useMemo(() => {
                let o = [...orders];
                if (statusFilter) o = o.filter(x => x.status === statusFilter);
                if (searchQuery) {
                    const q = searchQuery.toLowerCase();
                    o = o.filter(x => x.id.toLowerCase().includes(q) || (x.mood || '').toLowerCase().includes(q));
                }
                const sorts = {
                    newest: (a, b) => new Date(b.created_at) - new Date(a.created_at),
                    oldest: (a, b) => new Date(a.created_at) - new Date(b.created_at),
                    amount_desc: (a, b) => b.amount - a.amount,
                    health_desc: (a, b) => (b.avg_health_score || 0) - (a.avg_health_score || 0)
                };
                return o.sort(sorts[sortBy]);
            }, [orders, statusFilter, searchQuery, sortBy]);

            const stats = useMemo(() => {
                const totalSpent = orders.reduce((a, b) => a + (b.amount || 0), 0);
                const scored = orders.filter(o => o.avg_health_score);
                const avgHealth = scored.length ? Math.round(scored.reduce((a, b) => a + b.avg_health_score, 0) / scored.length) : 72;
                return {
                    totalOrders: orders.length,
                    totalSpent,
                    avgOrder: orders.length ? Math.round(totalSpent / orders.length) : 0,
                    avgHealth
                };
            }, [orders]);

            const formatDate = (d) => new Date(d).toLocaleDateString('en-IN', { day: 'numeric', month: 'long', year: 'numeric', hour: '2-digit', minute: '2-digit' });
            const paymentIcon = (m) => ({ upi: '📱', card: '💳', wallet: '🪙', cod: '💵' }[m] || '💳');
            const paymentLabel = (m) => ({ upi: 'UPI', card: 'Credit / Debit Card', wallet: 'Food Wallet', cod: 'Cash on Delivery' }[m] || (m || 'Online'));

            function ReceiptModal({ order, onClose }) {
                const items = order.items || [];
                const subtotal = items.length > 0
                    ? items.reduce((acc, i) => acc + ((i.price || 0) * (i.qty || 1)), 0)
                    : Math.round((order.amount || 0) / 1.05);
                const gst = Math.round(subtotal * 0.05);
                const totalPaid = order.amount || (subtotal + gst);

                function handlePrint() {
                    const content = document.getElementById('receipt-print-zone').innerHTML;
                    const w = window.open('', '_blank', 'width=420,height=720');
                    w.document.write(`<html><head><title>Receipt - AI Smart Food OS</title>
                    <style>
                        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
                        * { box-sizing: border-box; margin: 0; padding: 0; }
                        body { font-family: 'Inter', sans-serif; padding: 24px; font-size: 13px; color: #111; max-width: 380px; margin: auto; }
                        .row { display:flex; justify-content:space-between; margin: 5px 0; }
                        .bold { font-weight: 800; }
                        .dim { color: #888; }
                        .tag { font-size:0.7rem; text-transform:uppercase; letter-spacing:0.05em; color:#888; margin-bottom:2px; }
                        .meta-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; background:#f5f5f5; padding:14px; border-radius:10px; margin:14px 0; }
                        .item-row { display:flex; justify-content:space-between; background:#f5f5f5; padding:9px 12px; border-radius:8px; margin:5px 0; }
                        .header { text-align:center; padding-bottom:12px; border-bottom:1px dashed #ccc; margin-bottom:12px; }
                        .total-line { display:flex; justify-content:space-between; font-weight:800; font-size:1.1rem; color:#ff4500; border-top:2px solid #eee; padding-top:10px; margin-top:6px; }
                        .footer { text-align:center; margin-top:18px; color:#888; font-size:0.78rem; }
                    </style></head><body>${content}</body></html>`);
                    w.document.close();
                    setTimeout(() => { w.print(); w.close(); }, 400);
                }

                return (
                    <div onClick={(e) => e.target.id === 'receipt-overlay' && onClose()}
                         id="receipt-overlay"
                         style={{
                             position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.65)',
                             zIndex: 9999, display: 'flex', alignItems: 'center', justifyContent: 'center',
                             backdropFilter: 'blur(8px)', padding: '16px',
                             animation: 'fadeIn 0.2s ease'
                         }}>
                        <style>{`
                            @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
                            @keyframes slideUp { from { opacity: 0; transform: translateY(40px) scale(0.97); } to { opacity: 1; transform: translateY(0) scale(1); } }
                        `}</style>
                        <div style={{
                            background: 'var(--surface)', borderRadius: '20px',
                            width: '100%', maxWidth: '460px', maxHeight: '90vh',
                            overflowY: 'auto', boxShadow: '0 40px 100px rgba(0,0,0,0.5)',
                            animation: 'slideUp 0.28s cubic-bezier(0.34,1.56,0.64,1)'
                        }}>
                            <div style={{
                                background: 'linear-gradient(135deg, #ff4500 0%, #ff6b35 100%)',
                                padding: '28px', borderRadius: '20px 20px 0 0', position: 'relative'
                            }}>
                                <button onClick={onClose} style={{
                                    position: 'absolute', top: '16px', right: '16px',
                                    background: 'rgba(255,255,255,0.25)', border: 'none',
                                    borderRadius: '50%', width: '34px', height: '34px',
                                    color: 'white', cursor: 'pointer', fontSize: '1.1rem',
                                    display: 'flex', alignItems: 'center', justifyContent: 'center',
                                    fontWeight: 700, transition: 'background 0.2s'
                                }}>✕</button>
                                <div style={{ fontSize: '2.2rem', marginBottom: '6px' }}>🧾</div>
                                <div style={{ color: 'rgba(255,255,255,0.8)', fontSize: '0.72rem', fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.1em' }}>AI Smart Food OS</div>
                                <div style={{ color: 'white', fontWeight: 800, fontSize: '1.4rem', marginTop: '2px' }}>Order Receipt</div>
                            </div>

                            <div style={{ padding: '24px 28px' }}>
                                <div id="receipt-print-zone">
                                    <div className="header" style={{ textAlign: 'center', paddingBottom: '12px', borderBottom: '1px dashed var(--outline-variant)', marginBottom: '16px' }}>
                                        <div style={{ fontSize: '1.4rem', fontWeight: 800 }}>🍴 AI Food OS</div>
                                        <div style={{ fontSize: '0.78rem', color: 'var(--on-surface-dim)' }}>Your smart food companion — aifoodos.com</div>
                                    </div>

                                    <div style={{ background: 'var(--surface-high)', borderRadius: '12px', padding: '16px', marginBottom: '20px', display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '14px' }}>
                                        <div>
                                            <div style={{ fontSize: '0.68rem', color: 'var(--on-surface-dim)', fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.06em', marginBottom: '3px' }}>Order ID</div>
                                            <div style={{ fontWeight: 800, fontSize: '0.88rem' }}>#{order.id.slice(-8).toUpperCase()}</div>
                                        </div>
                                        <div>
                                            <div style={{ fontSize: '0.68rem', color: 'var(--on-surface-dim)', fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.06em', marginBottom: '3px' }}>Date & Time</div>
                                            <div style={{ fontWeight: 600, fontSize: '0.78rem' }}>{formatDate(order.created_at)}</div>
                                        </div>
                                        <div>
                                            <div style={{ fontSize: '0.68rem', color: 'var(--on-surface-dim)', fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.06em', marginBottom: '3px' }}>Payment</div>
                                            <div style={{ fontWeight: 700, fontSize: '0.85rem' }}>{paymentIcon(order.payment_method)} {paymentLabel(order.payment_method)}</div>
                                        </div>
                                        <div>
                                            <div style={{ fontSize: '0.68rem', color: 'var(--on-surface-dim)', fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.06em', marginBottom: '3px' }}>Status</div>
                                            <span style={{
                                                padding: '3px 10px', borderRadius: '20px', fontSize: '0.72rem', fontWeight: 700,
                                                background: order.status === 'delivered' ? '#d1fae5' : order.status === 'cancelled' ? '#fee2e2' : '#fef3c7',
                                                color: order.status === 'delivered' ? '#065f46' : order.status === 'cancelled' ? '#991b1b' : '#92400e'
                                            }}>
                                                {order.status === 'delivered' ? '✅ Delivered' : order.status === 'cancelled' ? '✕ Cancelled' : '🔄 ' + order.status}
                                            </span>
                                        </div>
                                        {order.delivery_address && (
                                            <div style={{ gridColumn: '1/-1', paddingTop: '12px', borderTop: '1px solid var(--outline-variant)' }}>
                                                <div style={{ fontSize: '0.68rem', color: 'var(--on-surface-dim)', fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.06em', marginBottom: '3px' }}>Delivered To</div>
                                                <div style={{ fontSize: '0.82rem', fontWeight: 500 }}>📍 {order.delivery_address}</div>
                                            </div>
                                        )}
                                    </div>

                                    <div style={{ marginBottom: '20px' }}>
                                        <div style={{ fontWeight: 700, fontSize: '0.78rem', color: 'var(--on-surface-dim)', textTransform: 'uppercase', letterSpacing: '0.08em', marginBottom: '10px' }}>
                                            Items Ordered
                                        </div>
                                        {items.length > 0 ? (
                                            <div style={{ display: 'flex', flexDirection: 'column', gap: '8px' }}>
                                                {items.map((item, idx) => (
                                                    <div key={idx} style={{
                                                        display: 'flex', justifyContent: 'space-between', alignItems: 'center',
                                                        padding: '11px 14px', background: 'var(--surface-high)', borderRadius: '10px'
                                                    }}>
                                                        <div>
                                                            <div style={{ fontWeight: 600, fontSize: '0.88rem' }}>{item.name || item.food_id || 'Food Item'}</div>
                                                            <div style={{ fontSize: '0.73rem', color: 'var(--on-surface-dim)' }}>Qty: {item.qty} × ₹{item.price || 0}</div>
                                                        </div>
                                                        <div style={{ fontWeight: 800, color: 'var(--primary)', fontSize: '0.95rem' }}>₹{(item.price || 0) * (item.qty || 1)}</div>
                                                    </div>
                                                ))}
                                            </div>
                                        ) : (
                                            <div style={{ padding: '14px', background: 'var(--surface-high)', borderRadius: '10px', fontSize: '0.82rem', color: 'var(--on-surface-dim)', textAlign: 'center' }}>
                                                Item details not available for this order
                                            </div>
                                        )}
                                    </div>

                                    <div style={{ borderTop: '2px dashed var(--outline-variant)', paddingTop: '16px', display: 'flex', flexDirection: 'column', gap: '8px' }}>
                                        <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: '0.85rem', color: 'var(--on-surface-dim)' }}>
                                            <span>Subtotal</span><span>₹{subtotal}</span>
                                        </div>
                                        <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: '0.85rem' }}>
                                            <span style={{ color: 'var(--on-surface-dim)' }}>🎉 Delivery Fee</span>
                                            <span style={{ color: '#16a34a', fontWeight: 700 }}>FREE</span>
                                        </div>
                                        <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: '0.85rem', color: 'var(--on-surface-dim)' }}>
                                            <span>GSTIN (5%)</span><span>₹{gst}</span>
                                        </div>
                                        <div style={{ display: 'flex', justifyContent: 'space-between', fontWeight: 800, fontSize: '1.2rem', color: 'var(--primary)', borderTop: '2px solid var(--outline-variant)', paddingTop: '12px', marginTop: '4px' }}>
                                            <span>Total Paid</span><span>₹{totalPaid}</span>
                                        </div>
                                    </div>

                                    {order.delivery_boy_name && (
                                        <div style={{ marginTop: '20px', padding: '12px 16px', background: 'var(--surface-high)', borderRadius: '12px', display: 'flex', alignItems: 'center', gap: '14px' }}>
                                            <div style={{ fontSize: '2rem' }}>🛵</div>
                                            <div>
                                                <div style={{ fontSize: '0.68rem', color: 'var(--on-surface-dim)', fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.06em' }}>Delivered By</div>
                                                <div style={{ fontWeight: 700, fontSize: '0.9rem' }}>{order.delivery_boy_name}</div>
                                            </div>
                                        </div>
                                    )}

                                    <div style={{ textAlign: 'center', marginTop: '20px', fontSize: '0.76rem', color: 'var(--on-surface-dim)', lineHeight: 1.6 }}>
                                        🔒 Secure RBI Compliant Payment<br />
                                        Thank you for ordering with AI Smart Food OS! 🍴
                                    </div>
                                </div>

                                <div style={{ display: 'flex', gap: '12px', marginTop: '24px' }}>
                                    <button className="btn btn-ghost" style={{ flex: 1, height: '46px' }} onClick={onClose}>Close</button>
                                    <button className="btn btn-primary" style={{ flex: 2, height: '46px' }} onClick={handlePrint}>
                                        🖨️ Print / Save Receipt
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div>
                    {receiptOrder && <ReceiptModal order={receiptOrder} onClose={() => setReceiptOrder(null)} />}

                    <div style={{background: 'var(--surface-low)', borderBottom: '1px solid var(--outline-variant)', padding: '32px 0'}}>
                        <div className="container">
                            <span className="section-tag">📋 Your Orders</span>
                            <div style={{display: 'flex', alignItems: 'flex-end', justifyContent: 'space-between', flexWrap: 'wrap', gap: '16px'}}>
                                <h1 className="section-title">Order <span style={{color: 'var(--primary)'}}>History</span></h1>
                                <button className="btn btn-primary btn-sm" onClick={() => location.href='/menu.html'}>+ New Order</button>
                            </div>
                        </div>
                    </div>

                    <div className="container section-sm">
                        <div className="grid-4" style={{marginBottom: '32px'}}>
                            <div className="stat-widget">
                                <div className="stat-label">Total Orders</div>
                                <div className="stat-value orange">{stats.totalOrders}</div>
                                <div className="stat-change">All time</div>
                            </div>
                            <div className="stat-widget">
                                <div className="stat-label">Total Spent</div>
                                <div className="stat-value">₹{stats.totalSpent}</div>
                                <div className="stat-change positive">Food investment</div>
                            </div>
                            <div className="stat-widget">
                                <div className="stat-label">Avg Order Value</div>
                                <div className="stat-value green">₹{stats.avgOrder}</div>
                                <div className="stat-change">{stats.avgOrder < 200 ? 'Budget friendly' : 'Above average'}</div>
                            </div>
                            <div className="stat-widget">
                                <div className="stat-label">Avg Health Score</div>
                                <div className={`stat-value ${stats.avgHealth >= 70 ? 'green' : 'orange'}`}>{stats.avgHealth}/100</div>
                                <div className="stat-change">{stats.avgHealth >= 70 ? 'Excellent' : 'Needs attention'}</div>
                            </div>
                        </div>

                        <div style={{display: 'flex', alignItems: 'center', gap: '12px', marginBottom: '24px', flexWrap: 'wrap'}}>
                            <div className="filter-tabs">
                                <button className={`filter-tab ${statusFilter === '' ? 'active' : ''}`} onClick={() => setStatusFilter('')}>All</button>
                                <button className={`filter-tab ${statusFilter === 'delivered' ? 'active' : ''}`} onClick={() => setStatusFilter('delivered')}>Delivered</button>
                                <button className={`filter-tab ${statusFilter === 'placed' ? 'active' : ''}`} onClick={() => setStatusFilter('placed')}>Placed</button>
                                <button className={`filter-tab ${statusFilter === 'cancelled' ? 'active' : ''}`} onClick={() => setStatusFilter('cancelled')}>Cancelled</button>
                            </div>
                            <div style={{marginLeft: 'auto', display: 'flex', gap: '10px'}}>
                                <input className="form-input" placeholder="Search orders..." value={searchQuery} onChange={e => setSearchQuery(e.target.value)} style={{width: '200px'}} />
                                <select className="form-input" value={sortBy} onChange={e => setSortBy(e.target.value)}>
                                    <option value="newest">Newest First</option>
                                    <option value="oldest">Oldest First</option>
                                </select>
                            </div>
                        </div>

                        <div style={{display: 'flex', flexDirection: 'column', gap: '16px'}}>
                            {filteredOrders.map(order => (
                                <div key={order.id} className="card"
                                     onClick={() => setExpandedOrder(expandedOrder === order.id ? null : order.id)}
                                     style={{cursor: 'pointer', border: expandedOrder === order.id ? '1px solid var(--primary)' : '1px solid transparent', transition: 'border 0.2s'}}>
                                    <div style={{display: 'flex', alignItems: 'center', gap: '20px'}}>
                                        <div style={{width: '52px', height: '52px', background: 'var(--surface-high)', borderRadius: '12px', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: '1.5rem'}}>
                                            {order.status === 'delivered' ? '✅' : order.status === 'cancelled' ? '❌' : '🔄'}
                                        </div>
                                        <div style={{flex: 1}}>
                                            <div style={{fontWeight: 700}}>Order #{order.id.slice(-6).toUpperCase()}</div>
                                            <div style={{fontSize: '0.8rem', color: 'var(--on-surface-dim)'}}>{formatDate(order.created_at)}</div>
                                        </div>
                                        <div style={{textAlign: 'right'}}>
                                            <div style={{fontSize: '1.3rem', fontWeight: 700, color: 'var(--primary)'}}>₹{order.amount}</div>
                                            <div style={{fontSize: '0.75rem', color: 'var(--on-surface-dim)'}}>Score: {order.avg_health_score || '—'}/100</div>
                                        </div>
                                    </div>
                                    {expandedOrder === order.id && (
                                        <div style={{marginTop: '16px', paddingTop: '16px', borderTop: '1px solid var(--outline-variant)'}}>
                                            <div style={{fontSize: '0.82rem', color: 'var(--on-surface-dim)', marginBottom: '12px', display: 'flex', gap: '12px', flexWrap: 'wrap'}}>
                                                <span>{paymentIcon(order.payment_method)} {paymentLabel(order.payment_method)}</span>
                                                {order.delivery_address && <span>📍 {order.delivery_address}</span>}
                                                {order.delivery_boy_name && <span>🛵 {order.delivery_boy_name}</span>}
                                            </div>
                                            <div style={{display: 'flex', gap: '10px', marginTop: '8px'}}>
                                                <button className="btn btn-primary btn-sm"
                                                    onClick={(e) => { e.stopPropagation(); location.href='/menu.html'; }}>
                                                    🔁 Reorder
                                                </button>
                                                <button className="btn btn-ghost btn-sm"
                                                    onClick={(e) => { e.stopPropagation(); setReceiptOrder(order); }}>
                                                    📄 View Receipt
                                                </button>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('react-orders-root'));
        root.render(<OrdersApp />);
    </script>
    
    <!-- AI CHATBOT -->
    <script src="/static/js/ChatWidget.js" type="text/babel"></script>
</body>
</html>
