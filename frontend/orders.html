<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order History — AI Smart Food OS</title>
    <meta name="description" content="View your order history and health insights.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&family=Outfit:wght@400;500;700&family=Plus+Jakarta+Sans:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    
    <!-- React via CDN -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <!-- NAVBAR -->
    <nav class="navbar">
        <div class="container">
            <a href="/index.html" class="nav-logo" id="nav-logo">
                <div class="logo-icon">🍴</div>
                AI Food<span class="logo-accent">OS</span>
            </a>

            <div class="nav-links">
                <a href="/index.html" id="nav-home">Home</a>
                <a href="/menu.html" id="nav-menu">Menu</a>
                <a href="/health.html" id="nav-health">Health</a>
                <a href="/orders.html" id="nav-orders" class="active">Orders</a>
                <a href="/profile.html" id="nav-profile">Profile</a>
                <a href="/settings.html" id="nav-settings" style="font-size: 1.1rem;">⚙</a>
            </div>

            <div class="nav-actions">
                <button class="btn btn-ghost btn-icon" id="theme-toggle" title="Toggle Theme" style="font-size: 1.1rem;">🌓</button>
                <span class="btn btn-pro" id="nav-pro-badge">⚡ PRO</span>
                <button class="btn btn-ghost btn-sm" id="nav-wallet-btn" onclick="location.href='/profile.html'"
                        style="display:flex;align-items:center;gap:6px;">
                    <span style="font-size:0.9rem;">💳</span>
                    <span id="nav-wallet-balance">–</span>
                </button>
                <button class="btn btn-ghost btn-icon" id="nav-logout-btn" onclick="logout()" title="Sign out"
                        style="font-size:1.1rem; padding: 8px 12px;">⏻</button>
            </div>
        </div>
    </nav>

    <!-- REACT MOUNT POINT -->
    <main id="react-orders-root"></main>

    <!-- GLOBAL SCRIPTS -->
    <script>
        const API_BASE = 'http://localhost:8000';
        async function logout() {
            try { await fetch(API_BASE + '/api/auth/signout', { method: 'POST' }); } catch(e) {}
            window.location.href = '/signin.html';
        }

        async function loadNavInfo() {
            try {
                const r = await fetch(API_BASE + '/api/profile');
                if (r.ok) {
                    const data = await r.json();
                    const bal = data.wallet_balance || 0;
                    document.getElementById('nav-wallet-balance').textContent = '₹' + parseFloat(bal).toFixed(0);
                    if (data.subscription_tier === 'free') {
                        document.getElementById('nav-pro-badge').textContent = '⬆ Upgrade';
                        document.getElementById('nav-pro-badge').onclick = () => location.href = '/profile.html#pricing';
                    }
                }
            } catch(e) {}
        }
        
        // Theme Toggle Logic
        const themeToggle = document.getElementById('theme-toggle');
        const body = document.body;
        if (localStorage.getItem('theme') === 'dark') body.classList.add('dark-mode');
        themeToggle.addEventListener('click', () => {
            body.classList.toggle('dark-mode');
            localStorage.setItem('theme', body.classList.contains('dark-mode') ? 'dark' : 'light');
        });

        document.addEventListener('DOMContentLoaded', loadNavInfo);
    </script>

    <!-- REACT ORDERS COMPONENT -->
    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        function OrdersApp() {
            const [orders, setOrders] = useState([]);
            const [loading, setLoading] = useState(true);
            const [statusFilter, setStatusFilter] = useState('');
            const [searchQuery, setSearchQuery] = useState('');
            const [sortBy, setSortBy] = useState('newest');
            const [expandedOrder, setExpandedOrder] = useState(null);
            const [ratingModal, setRatingModal] = useState(null);
            const [receiptOrder, setReceiptOrder] = useState(null);
            const [ratingStars, setRatingStars] = useState(0);

            useEffect(() => {
                fetchOrders();
            }, []);

            async function fetchOrders() {
                try {
                    const r = await fetch('http://localhost:8000/api/orders');
                    if (r.ok) {
                        const d = await r.json();
                        setOrders(d);
                    } else {
                        throw new Error('Failed');
                    }
                } catch(e) {
                    // Failover to demo data
                    const statuses = ['delivered', 'delivered', 'placed', 'cancelled', 'delivered'];
                    const moods = ['happy', 'stressed', 'gym', 'lazy', 'adventurous'];
                    const dummy = Array.from({ length: 8 }, (_, i) => ({
                        id: 'ord-' + Math.random().toString(36).slice(2, 10),
                        amount: Math.round(Math.random() * 300 + 80),
                        status: statuses[i % statuses.length],
                        mood: moods[i % moods.length],
                        created_at: new Date(Date.now() - i * 86400000 * 2).toISOString(),
                        delivery_boy_name: ['Rohan Kumar', 'Aakash Singh', 'Priya Sharma'][i % 3],
                        avg_health_score: Math.round(Math.random() * 50 + 40),
                        payment_method: ['upi', 'card', 'wallet'][i % 3],
                        items: [],
                        rated: i % 2 === 0
                    }));
                    setOrders(dummy);
                }
                setLoading(false);
            }

            const filteredOrders = useMemo(() => {
                let o = [...orders];
                if (statusFilter) o = o.filter(x => x.status === statusFilter);
                if (searchQuery) {
                    const q = searchQuery.toLowerCase();
                    o = o.filter(x => x.id.toLowerCase().includes(q) || (x.mood || '').toLowerCase().includes(q));
                }
                const sorts = {
                    newest: (a, b) => new Date(b.created_at) - new Date(a.created_at),
                    oldest: (a, b) => new Date(a.created_at) - new Date(b.created_at),
                    amount_desc: (a, b) => b.amount - a.amount,
                    health_desc: (a, b) => (b.avg_health_score || 0) - (a.avg_health_score || 0)
                };
                return o.sort(sorts[sortBy]);
            }, [orders, statusFilter, searchQuery, sortBy]);

            const stats = useMemo(() => {
                const totalSpent = orders.reduce((a, b) => a + (b.amount || 0), 0);
                const scored = orders.filter(o => o.avg_health_score);
                const avgHealth = scored.length ? Math.round(scored.reduce((a, b) => a + b.avg_health_score, 0) / scored.length) : 72;
                return {
                    totalOrders: orders.length,
                    totalSpent,
                    avgOrder: orders.length ? Math.round(totalSpent / orders.length) : 0,
                    avgHealth
                };
            }, [orders]);

            const formatDate = (d) => new Date(d).toLocaleDateString('en-IN', { day: 'numeric', month: 'long', year: 'numeric', hour: '2-digit', minute: '2-digit' });
            const getMoodEmoji = (mood) => { const m = { happy: '😊', stressed: '😫', gym: '🏋️', lazy: '🛋️', adventurous: '🌋', tired: '😴' }; return m[mood] || ''; };

            return (
                <div>
                    <div style={{background: 'var(--surface-low)', borderBottom: '1px solid var(--outline-variant)', padding: '32px 0'}}>
                        <div className="container">
                            <span className="section-tag">📋 Your Orders</span>
                            <div style={{display: 'flex', alignItems: 'flex-end', justifyContent: 'space-between', flexWrap: 'wrap', gap: '16px'}}>
                                <h1 className="section-title">Order <span style={{color: 'var(--primary)'}}>History</span></h1>
                                <button className="btn btn-primary btn-sm" onClick={() => location.href='/menu.html'}>+ New Order</button>
                            </div>
                        </div>
                    </div>

                    <div className="container section-sm">
                        <div className="grid-4" style={{marginBottom: '32px'}}>
                            <div className="stat-widget">
                                <div className="stat-label">Total Orders</div>
                                <div className="stat-value orange">{stats.totalOrders}</div>
                                <div className="stat-change">All time</div>
                            </div>
                            <div className="stat-widget">
                                <div className="stat-label">Total Spent</div>
                                <div className="stat-value">₹{stats.totalSpent}</div>
                                <div className="stat-change positive">Food investment</div>
                            </div>
                            <div className="stat-widget">
                                <div className="stat-label">Avg Order Value</div>
                                <div className="stat-value green">₹{stats.avgOrder}</div>
                                <div className="stat-change">{stats.avgOrder < 200 ? 'Budget friendly' : 'Above average'}</div>
                            </div>
                            <div className="stat-widget">
                                <div className="stat-label">Avg Health Score</div>
                                <div className={`stat-value ${stats.avgHealth >= 70 ? 'green' : 'orange'}`}>{stats.avgHealth}/100</div>
                                <div className="stat-change">{stats.avgHealth >= 70 ? 'Excellent' : 'Needs attention'}</div>
                            </div>
                        </div>

                        <div style={{display: 'flex', alignItems: 'center', gap: '12px', marginBottom: '24px', flexWrap: 'wrap'}}>
                            <div className="filter-tabs">
                                <button className={`filter-tab ${statusFilter === '' ? 'active' : ''}`} onClick={() => setStatusFilter('')}>All</button>
                                <button className={`filter-tab ${statusFilter === 'delivered' ? 'active' : ''}`} onClick={() => setStatusFilter('delivered')}>Delivered</button>
                                <button className={`filter-tab ${statusFilter === 'placed' ? 'active' : ''}`} onClick={() => setStatusFilter('placed')}>Placed</button>
                                <button className={`filter-tab ${statusFilter === 'cancelled' ? 'active' : ''}`} onClick={() => setStatusFilter('cancelled')}>Cancelled</button>
                            </div>
                            <div style={{marginLeft: 'auto', display: 'flex', gap: '10px'}}>
                                <input className="form-input" placeholder="Search orders..." value={searchQuery} onChange={e => setSearchQuery(e.target.value)} style={{width: '200px'}} />
                                <select className="form-input" value={sortBy} onChange={e => setSortBy(e.target.value)}>
                                    <option value="newest">Newest First</option>
                                    <option value="oldest">Oldest First</option>
                                </select>
                            </div>
                        </div>

                        <div style={{display: 'flex', flexDirection: 'column', gap: '16px'}}>
                            {filteredOrders.map(order => (
                                <div key={order.id} className="card" onClick={() => setExpandedOrder(expandedOrder === order.id ? null : order.id)}
                                     style={{cursor: 'pointer', border: expandedOrder === order.id ? '1px solid var(--primary)' : '1px solid transparent'}}>
                                    <div style={{display: 'flex', alignItems: 'center', gap: '20px'}}>
                                        <div style={{width: '52px', height: '52px', background: 'var(--surface-high)', borderRadius: '12px', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: '1.5rem'}}>
                                            {order.status === 'delivered' ? '✅' : order.status === 'cancelled' ? '✕' : '🔄'}
                                        </div>
                                        <div style={{flex: 1}}>
                                            <div style={{fontWeight: 700}}>Order #{order.id.slice(-6).toUpperCase()}</div>
                                            <div style={{fontSize: '0.8rem', color: 'var(--on-surface-dim)'}}>{formatDate(order.created_at)}</div>
                                        </div>
                                        <div style={{textAlign: 'right'}}>
                                            <div style={{fontSize: '1.3rem', fontWeight: 700, color: 'var(--primary)'}}>₹{order.amount}</div>
                                            <div style={{fontSize: '0.75rem', color: 'var(--on-surface-dim)'}}>Score: {order.avg_health_score}/100</div>
                                        </div>
                                    </div>
                                    {expandedOrder === order.id && (
                                        <div style={{marginTop: '16px', paddingTop: '16px', borderTop: '1px solid var(--outline-variant)'}}>
                                            <p style={{fontSize: '0.85rem', color: 'var(--on-surface-dim)'}}>Items details syncing...</p>
                                            <div style={{display: 'flex', gap: '10px', marginTop: '16px'}}>
                                                <button className="btn btn-primary btn-sm" onClick={(e) => {e.stopPropagation(); location.href='/menu.html';}}>🔁 Reorder</button>
                                                <button className="btn btn-ghost btn-sm" onClick={(e) => {e.stopPropagation(); setReceiptOrder(order);}}>📄 Receipt</button>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('react-orders-root'));
        root.render(<OrdersApp />);
    </script>
    
    <!-- AI CHATBOT -->
    <script src="/static/js/ChatWidget.js" type="text/babel"></script>
</body>
</html>
