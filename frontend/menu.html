<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Menu — AI Smart Food OS</title>
    <meta name="description" content="Browse AI-ranked food menu with health scores, macros, and budget filters.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&family=Outfit:wght@400;500;700&family=Plus+Jakarta+Sans:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css?v=2">
    
    <!-- React via CDN -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <!-- NAVBAR -->
    <nav class="navbar">
        <div class="container">
            <a href="/index.html" class="nav-logo" id="nav-logo">
                <div class="logo-icon">🍴</div>
                AI Food <span class="logo-accent">OS</span>
            </a>

            <div class="nav-links">
                <a href="/index.html" id="nav-home">Home</a>
                <a href="/menu.html" id="nav-menu" class="active">Menu</a>
                <a href="/health.html" id="nav-health">Health</a>
                <a href="/orders.html" id="nav-orders">Orders</a>
                <a href="/profile.html" id="nav-profile">Profile</a>
            </div>

            <div class="nav-actions">
                <button class="btn-icon-circle" id="nav-settings-btn" onclick="location.href='/settings.html'" title="Settings">⚙</button>
                <button class="btn-icon-circle" id="theme-toggle" title="Toggle Theme">🌓</button>
                <div class="btn-pro" id="nav-pro-badge" onclick="location.href='/profile.html#pricing'" style="cursor: pointer;">⚡ PRO</div>
                <div class="wallet-pill" id="nav-wallet-pill" onclick="location.href='/profile.html'" style="cursor: pointer;">
                    <span>💳</span>
                    <span id="nav-wallet-balance">–</span>
                </div>
                <button class="btn-icon-circle" id="nav-logout-btn" onclick="logout()" title="Sign out" style="color: var(--on-surface);">⏻</button>
            </div>
        </div>
    </nav>

    <!-- MAIN CONTENT: REACT MOUNT POINT -->
    <main id="react-menu-root"></main>

    <!-- GLOBAL SCRIPTS -->
    <script>
        const API_BASE = 'http://localhost:8000';
        
        async function logout() {
            try { await fetch(API_BASE + '/api/auth/signout', { method: 'POST' }); } catch(e) {}
            window.location.href = '/landing.html';
        }

        async function loadNavInfo() {
            try {
                const r = await fetch(API_BASE + '/api/profile');
                if (r.ok) {
                    const data = await r.json();
                    const bal = data.wallet_balance || 0;
                    document.getElementById('nav-wallet-balance').textContent = '₹' + parseFloat(bal).toFixed(0);
                    const proBadge = document.getElementById('nav-pro-badge');
                    if (data.subscription_tier === 'free') {
                        proBadge.textContent = '⚡ Upgrade';
                        proBadge.style.background = 'var(--surface-highest)';
                        proBadge.style.color = 'var(--on-surface)';
                    } else {
                        proBadge.textContent = '⚡ PRO';
                        proBadge.style.background = 'var(--accent-pro)';
                        proBadge.style.color = '#000';
                    }
                }
            } catch(e) {}
        }

        // Theme Toggle Logic
        const themeToggle = document.getElementById('theme-toggle');
        const body = document.body;
        if (localStorage.getItem('theme') === 'dark') body.classList.add('dark-mode');
        themeToggle.addEventListener('click', () => {
            body.classList.toggle('dark-mode');
            localStorage.setItem('theme', body.classList.contains('dark-mode') ? 'dark' : 'light');
        });

        document.addEventListener('DOMContentLoaded', loadNavInfo);
    </script>

    <!-- REACT MENU COMPONENT -->
    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        function MenuApp() {
            const [foods, setFoods] = useState([]);
            const [loading, setLoading] = useState(true);
            const [cart, setCart] = useState(() => JSON.parse(localStorage.getItem('cart') || '[]'));
            
            // Filters
            const [budget, setBudget] = useState(500);
            const [minHealth, setMinHealth] = useState(0);
            const [activeCategory, setActiveCategory] = useState('');
            const [activeMood, setActiveMood] = useState('');
            const [vegOnly, setVegOnly] = useState(false);
            const [spicyOnly, setSpicyOnly] = useState(false);
            const [hideOily, setHideOily] = useState(false);
            const [sortBy, setSortBy] = useState('health');
            const [emergencyMode, setEmergencyMode] = useState(false);

            useEffect(() => {
                fetchFoods();
            }, []);

            useEffect(() => {
                localStorage.setItem('cart', JSON.stringify(cart));
            }, [cart]);

            async function fetchFoods() {
                try {
                    const res = await fetch('http://localhost:8000/api/foods');
                    const data = await res.json();
                    setFoods(data);
                } catch(e) {
                    console.error("Error fetching foods", e);
                } finally {
                    setLoading(false);
                }
            }

            const categories = useMemo(() => {
                const cats = new Set(foods.map(f => f.category));
                return Array.from(cats).filter(Boolean);
            }, [foods]);

            const moods = [
                { id: 'happy', emoji: '😊', label: 'Feel Good' },
                { id: 'stressed', emoji: '😫', label: 'Stressed / Comfort' },
                { id: 'tired', emoji: '🥱', label: 'Energy Boost' },
                { id: 'gym', emoji: '💪', label: 'Post-Workout' },
                { id: 'lazy', emoji: '🛋️', label: 'Lazy / Easy' },
                { id: 'adventurous', emoji: '🌶️', label: 'Adventurous' }
            ];

            const filteredFoods = useMemo(() => {
                let result = [...foods];
                
                if (emergencyMode) {
                    result = result.filter(f => f.price <= 80);
                } else {
                    result = result.filter(f => f.price <= budget);
                    result = result.filter(f => f.health_score >= minHealth);
                    if (activeCategory) result = result.filter(f => f.category === activeCategory);
                    if (activeMood) result = result.filter(f => (f.mood_tags || []).includes(activeMood));
                    if (vegOnly) result = result.filter(f => f.is_veg);
                    if (spicyOnly) result = result.filter(f => f.is_spicy);
                    if (hideOily) result = result.filter(f => !f.is_oily);
                }

                result.sort((a, b) => {
                    if (sortBy === 'health') return (b.health_score || 0) - (a.health_score || 0);
                    if (sortBy === 'price_asc') return a.price - b.price;
                    if (sortBy === 'price_desc') return b.price - a.price;
                    if (sortBy === 'calories') return a.calories - b.calories;
                    return 0;
                });

                return result;
            }, [foods, emergencyMode, budget, minHealth, activeCategory, activeMood, vegOnly, spicyOnly, hideOily, sortBy]);

            const cartCount = cart.reduce((acc, item) => acc + item.qty, 0);
            const cartTotal = cart.reduce((acc, item) => acc + (item.price * item.qty), 0);

            function addToCart(food) {
                const exist = cart.find(i => i.id === food.id);
                let newCart;
                if (exist) {
                    newCart = cart.map(i => i.id === food.id ? {...i, qty: i.qty + 1} : i);
                } else {
                    newCart = [...cart, {...food, qty: 1}];
                }
                setCart(newCart);
                localStorage.setItem('cart', JSON.stringify(newCart));
            }

            function removeFromCart(idx) {
                const newCart = [...cart];
                newCart.splice(idx, 1);
                setCart(newCart);
                localStorage.setItem('cart', JSON.stringify(newCart));
            }

            function updateQty(idx, delta) {
                const newCart = [...cart];
                newCart[idx].qty = Math.max(1, newCart[idx].qty + delta);
                setCart(newCart);
                localStorage.setItem('cart', JSON.stringify(newCart));
            }

            function toggleEmergency() {
                setEmergencyMode(!emergencyMode);
                if (!emergencyMode) {
                    setBudget(80);
                } else {
                    setBudget(500);
                }
            }

            return (
                <div>
                    {/* PAGE HEADER MATCHING HOME AESTHETIC */}
                    <div style={{ padding: '60px 0 40px 0', backgroundColor: 'var(--bg)' }}>
                        <div className="container">
                            <div className="section-tag">AI Smart Menu</div>
                            <div style={{display: 'flex', alignItems: 'flex-end', justifyContent: 'space-between', gap: '20px', flexWrap: 'wrap'}}>
                                <h1 className="section-title" style={{ margin: 0 }}>
                                    Food Intelligence <span style={{color: 'var(--accent-emergency)'}}>Catalogue</span>
                                </h1>
                                <div style={{display: 'flex', gap: '16px', alignItems: 'center'}}>
                                    <button className={`btn-emergency ${emergencyMode ? 'active' : ''}`} onClick={toggleEmergency}>
                                        {!emergencyMode ? '🆘 Emergency Mode' : '✕ Exit Emergency'}
                                    </button>
                                    <button className="btn btn-primary" onClick={() => location.href='/checkout.html'} style={{borderRadius: '16px', padding: '12px 24px'}}>
                                        🛒 Cart ({cartCount})
                                    </button>
                                </div>
                            </div>

                            {/* EMERGENCY BANNER */}
                            {emergencyMode && (
                                <div className="emergency-banner" style={{marginTop: '32px', background: 'rgba(239, 68, 68, 0.05)', border: '1px solid rgba(239, 68, 68, 0.2)', borderRadius: '20px', padding: '24px'}}>
                                    <div style={{display: 'flex', gap: '20px', alignItems: 'center'}}>
                                        <div style={{fontSize: '2rem'}}>🆘</div>
                                        <div>
                                            <strong style={{color: '#ef4444', display: 'block', fontSize: '1.1rem', marginBottom: '4px'}}>Survival Mode Activated</strong>
                                            <div style={{fontSize: '0.9rem', color: 'var(--on-surface-dim)'}}>Showing calorie-dense meals under ₹80 only. Optimized for survival.</div>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>

                    <div className="container section-sm">
                        <div style={{display: 'grid', gridTemplateColumns: '280px 1fr', gap: '32px', alignItems: 'start'}}>
                            
                            {/* LEFT SIDEBAR: FILTERS */}
                            <aside className="card" style={{position: 'sticky', top: '90px'}}>
                                <h3 style={{fontFamily: 'var(--font-display)', fontWeight: 700, marginBottom: '20px', fontSize: '1.2rem', color: 'var(--primary)'}}>
                                                    Menu Categories
                                                </h3>
                                                
                                                <div style={{display: 'flex', flexDirection: 'column', gap: '8px', marginBottom: '28px'}}>
                                                    <button 
                                                        onClick={() => setActiveCategory('')}
                                                        style={{textAlign: 'left', padding: '10px 16px', borderRadius: '8px', cursor: 'pointer', fontWeight: 600, border: 'none', background: activeCategory === '' ? 'var(--primary)' : 'var(--surface-high)', color: activeCategory === '' ? '#fff' : 'var(--on-surface)'}}>
                                                        All Items
                                                    </button>
                                                    {categories.map(cat => (
                                                        <button 
                                                            key={cat}
                                                            onClick={() => setActiveCategory(cat)}
                                                            style={{textAlign: 'left', padding: '10px 16px', borderRadius: '8px', cursor: 'pointer', fontWeight: 600, border: 'none', background: activeCategory === cat ? 'var(--primary)' : 'var(--surface-high)', color: activeCategory === cat ? '#fff' : 'var(--on-surface)'}}>
                                                            {cat}
                                                        </button>
                                                    ))}
                                                </div>

                                                <hr style={{borderColor: 'var(--outline-variant)', margin: '24px 0'}} />

                                                <h3 style={{fontFamily: 'var(--font-display)', fontWeight: 700, marginBottom: '20px', fontSize: '1.2rem'}}>
                                                    🎛️ Smart Filters
                                                </h3>

                                <div className="form-group" style={{marginBottom: '24px'}}>
                                    <label className="form-label">Budget Range</label>
                                    <div style={{display: 'flex', justifyContent: 'space-between', marginBottom: '8px'}}>
                                        <span style={{fontSize: '0.8rem', color: 'var(--on-surface-dim)'}}>₹50</span>
                                        <span style={{fontSize: '0.85rem', fontWeight: 700, color: 'var(--primary)'}}>Under ₹{budget}</span>
                                        <span style={{fontSize: '0.8rem', color: 'var(--on-surface-dim)'}}>₹500</span>
                                    </div>
                                    <input type="range" min="50" max="500" step="10" value={budget} onChange={e => setBudget(Number(e.target.value))}
                                           style={{width: '100%', accentColor: 'var(--primary)', cursor: 'pointer'}} />
                                </div>

                                <div className="form-group" style={{marginBottom: '24px'}}>
                                    <label className="form-label">Min Health Score</label>
                                    <div style={{display: 'flex', justifyContent: 'space-between', marginBottom: '8px'}}>
                                        <span style={{fontSize: '0.8rem', color: 'var(--on-surface-dim)'}}>0</span>
                                        <span style={{fontSize: '0.85rem', fontWeight: 700, color: 'var(--secondary)'}}>{minHealth}+</span>
                                        <span style={{fontSize: '0.8rem', color: 'var(--on-surface-dim)'}}>100</span>
                                    </div>
                                    <input type="range" min="0" max="100" step="5" value={minHealth} onChange={e => setMinHealth(Number(e.target.value))}
                                           style={{width: '100%', accentColor: 'var(--secondary)', cursor: 'pointer'}} />
                                </div>

                                <div className="form-group" style={{marginBottom: '24px'}}>
                                    <label className="form-label">Mood</label>
                                    <div style={{display: 'flex', flexDirection: 'column', gap: '6px'}}>
                                        {moods.map(m => (
                                            <button key={m.id}
                                                    onClick={() => setActiveMood(activeMood === m.id ? null : m.id)}
                                                    className={activeMood === m.id ? 'btn btn-secondary btn-sm' : 'btn btn-ghost btn-sm'}
                                                    style={{justifyContent: 'flex-start', gap: '8px', textAlign: 'left'}}>
                                                <span>{m.emoji}</span>
                                                <span>{m.label}</span>
                                            </button>
                                        ))}
                                    </div>
                                </div>

                                <div style={{marginBottom: '24px'}}>
                                    <label className="form-label" style={{marginBottom: '12px', display: 'block'}}>Diet Preference</label>
                                    <div style={{display: 'flex', flexDirection: 'column', gap: '10px'}}>
                                        <label style={{display: 'flex', alignItems: 'center', justifyContent: 'space-between', cursor: 'pointer'}}>
                                            <span style={{fontSize: '0.875rem', color: 'var(--on-surface-dim)'}}>🟢 Vegetarian only</span>
                                            <label className="toggle-switch">
                                                <input type="checkbox" checked={vegOnly} onChange={e => setVegOnly(e.target.checked)} />
                                                <span className="toggle-slider"></span>
                                            </label>
                                        </label>
                                        <label style={{display: 'flex', alignItems: 'center', justifyContent: 'space-between', cursor: 'pointer'}}>
                                            <span style={{fontSize: '0.875rem', color: 'var(--on-surface-dim)'}}>🌶️ Spicy only</span>
                                            <label className="toggle-switch">
                                                <input type="checkbox" checked={spicyOnly} onChange={e => setSpicyOnly(e.target.checked)} />
                                                <span className="toggle-slider"></span>
                                            </label>
                                        </label>
                                        <label style={{display: 'flex', alignItems: 'center', justifyContent: 'space-between', cursor: 'pointer'}}>
                                            <span style={{fontSize: '0.875rem', color: 'var(--on-surface-dim)'}}>🚫 Hide oily</span>
                                            <label className="toggle-switch">
                                                <input type="checkbox" checked={hideOily} onChange={e => setHideOily(e.target.checked)} />
                                                <span className="toggle-slider"></span>
                                            </label>
                                        </label>
                                    </div>
                                </div>

                                <button className="btn btn-primary" style={{width: '100%'}} onClick={() => {
                                    setBudget(500); setMinHealth(0); setActiveMood('');
                                    setVegOnly(false); setSpicyOnly(false); setHideOily(false); setEmergencyMode(false);
                                }}>Reset Filters</button>

                                {/* Cart Summary */}
                                {cartCount > 0 && (
                                    <div style={{marginTop: '20px', paddingTop: '20px', borderTop: '1px solid var(--outline-variant)'}}>
                                        <div className="form-label" style={{marginBottom: '10px'}}>🛒 Cart Summary</div>
                                        {cart.map((item, idx) => (
                                            <div key={item.id} style={{display: 'flex', justifyContent: 'space-between', alignItems: 'center', fontSize: '0.8rem', marginBottom: '6px', color: 'var(--on-surface-dim)'}}>
                                                <span>{item.name} ×{item.qty}</span>
                                                <div style={{display: 'flex', alignItems: 'center', gap: '4px'}}>
                                                    <button onClick={() => updateQty(idx, -1)} style={{background: 'var(--surface)', border: '1px solid var(--outline)', borderRadius: '4px', padding: '2px 6px', cursor: 'pointer'}}>−</button>
                                                    <span style={{color: 'var(--primary)'}}>₹{item.price * item.qty}</span>
                                                    <button onClick={() => updateQty(idx, 1)} style={{background: 'var(--surface)', border: '1px solid var(--outline)', borderRadius: '4px', padding: '2px 6px', cursor: 'pointer'}}>+</button>
                                                </div>
                                            </div>
                                        ))}
                                        <div style={{display: 'flex', justifyContent: 'space-between', fontWeight: 700, marginTop: '10px', paddingTop: '10px', borderTop: '1px solid var(--outline-variant)'}}>
                                            <span>Total</span>
                                            <span style={{color: 'var(--primary)'}}>₹{cartTotal}</span>
                                        </div>
                                        <button className="btn btn-primary" style={{width: '100%', marginTop: '12px'}} onClick={() => location.href='/checkout.html'}>
                                            Checkout →
                                        </button>
                                    </div>
                                )}
                            </aside>

                            {/* MAIN CONTENT */}
                            <div>
                                {/* RESULTS INFO */}
                                <div style={{display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: '20px'}}>
                                    <span style={{fontSize: '0.875rem', color: 'var(--on-surface-dim)'}}>
                                        {filteredFoods.length} results found
                                    </span>
                                    <select className="form-input" style={{width: 'auto', padding: '8px 12px'}} value={sortBy} onChange={e => setSortBy(e.target.value)}>
                                        <option value="health">Sort: Health Score ↓</option>
                                        <option value="price_asc">Price: Low to High</option>
                                        <option value="price_desc">Price: High to Low</option>
                                        <option value="calories">Lowest Calories</option>
                                    </select>
                                </div>

                                {/* LOADING SKELETON */}
                                {loading && (
                                    <div className="grid-auto">
                                        {[...Array(8)].map((_, i) => (
                                            <div key={i} className="food-card" style={{cursor: 'default'}}>
                                                <div className="food-card-img skeleton"></div>
                                                <div className="food-card-body">
                                                    <div className="skeleton" style={{height:'18px', borderRadius:'6px', width:'65%'}}></div>
                                                    <div className="skeleton" style={{height:'14px', borderRadius:'6px', width:'40%', marginTop:'8px'}}></div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}

                                {filteredFoods.length > 0 ? (
                                    <div className="grid-auto" style={{animation: 'slideInUp 0.5s var(--ease-out)'}}>
                                        {filteredFoods.map(food => (
                                            <div key={food.id} className="food-card">
                                                <div className="food-card-img" style={{
                                                    backgroundImage: food.image_url ? `url(${food.image_url})` : 'none',
                                                    backgroundSize: 'cover',
                                                    backgroundPosition: 'center',
                                                    backgroundColor: food.image_url ? 'transparent' : 'var(--surface-low)',
                                                    display: food.image_url ? 'block' : 'flex',
                                                    justifyContent: 'center',
                                                    alignItems: 'center'
                                                }}>
                                                    {!food.image_url && <span style={{fontSize: '4rem'}}>{food.image_emoji || '🍽️'}</span>}
                                                    {food.health_score >= 85 && <div className="food-badge">✨ AI Pick</div>}
                                                    <div className={`diet-indicator ${food.is_veg ? 'veg' : 'non-veg'}`}></div>
                                                </div>

                                                <div className="food-card-body">
                                                    <div className="food-card-header">
                                                        <div className="food-title">{food.name}</div>
                                                        <div className="food-price">₹{food.price}</div>
                                                    </div>
                                                    
                                                    <div className="health-ring-wrap">
                                                        <div className="health-ring" style={{'--pct': `${(food.health_score || 0) * 3.6}deg`, '--score-color': food.health_score >= 80 ? 'var(--success)' : food.health_score >= 60 ? 'var(--secondary)' : 'var(--error)'}}>
                                                            <span>{food.health_score}</span>
                                                        </div>
                                                        <div>
                                                            <div className="health-label">HEALTH</div>
                                                            <div className="health-status" style={{color: food.health_score >= 80 ? 'var(--success)' : food.health_score >= 60 ? 'var(--secondary)' : 'var(--error)'}}>
                                                                {food.health_score >= 80 ? 'Excellent' : food.health_score >= 60 ? 'Moderate' : 'Caution'}
                                                            </div>
                                                        </div>
                                                        <div className="cost-to-create">
                                                            <div className="cost-label">COST TO CREATE</div>
                                                            <div className="cost-val">~₹{Math.round(food.price * 0.4)}</div>
                                                        </div>
                                                    </div>
                                                    
                                                    <button className="btn btn-primary" style={{marginTop: '24px', width: '100%', borderRadius: '16px', fontWeight: 700}} onClick={() => addToCart(food)}>
                                                        Add to Order +
                                                    </button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                ) : (
                                    <div style={{textAlign: 'center', padding: '60px 0', color: 'var(--on-surface-dim)'}}>
                                        <div style={{fontSize: '4rem', marginBottom: '20px'}}>🔍</div>
                                        <h3>No matches found</h3>
                                        <p>Try adjusting your filters or budget.</p>
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            )
        }

        const root = ReactDOM.createRoot(document.getElementById('react-menu-root'));
        root.render(<MenuApp />);
    </script>
    <!-- AI CHATBOT -->
    <script src="/static/js/ChatWidget.js" type="text/babel"></script>
</body>
</html>
