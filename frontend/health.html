<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health Analytics — AI Smart Food OS</title>
    <meta name="description" content="Your personal bio-sync dashboard — track BMI, TDEE, macros, diabetes risk and 30-day health forecast.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&family=Outfit:wght@400;500;700&family=Plus+Jakarta+Sans:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css?v=2">
    
    <!-- React via CDN -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <!-- NAVBAR -->
    <nav class="navbar">
        <div class="container">
            <a href="/index.html" class="nav-logo" id="nav-logo">
                <div class="logo-icon">🍴</div>
                AI Food<span class="logo-accent">OS</span>
            </a>

            <div class="nav-links">
                <a href="/index.html" id="nav-home">Home</a>
                <a href="/menu.html" id="nav-menu">Menu</a>
                <a href="/health.html" id="nav-health" class="active">Health</a>
                <a href="/orders.html" id="nav-orders">Orders</a>
                <a href="/profile.html" id="nav-profile">Profile</a>
                <a href="/settings.html" id="nav-settings" style="font-size: 1.1rem;">⚙</a>
            </div>

            <div class="nav-actions">
                <button class="btn btn-ghost btn-icon" id="theme-toggle" title="Toggle Theme" style="font-size: 1.1rem;">🌓</button>
                <span class="btn btn-pro" id="nav-pro-badge">⚡ PRO</span>
                <button class="btn btn-ghost btn-sm" id="nav-wallet-btn" onclick="location.href='/profile.html'"
                        style="display:flex;align-items:center;gap:6px;">
                    <span style="font-size:0.9rem;">💳</span>
                    <span id="nav-wallet-balance">–</span>
                </button>
                <button class="btn btn-ghost btn-icon" id="nav-logout-btn" onclick="logout()" title="Sign out"
                        style="font-size:1.1rem; padding: 8px 12px;">⏻</button>
            </div>
        </div>
    </nav>

    <!-- REACT MOUNT POINT -->
    <main id="react-health-root"></main>

    <!-- GLOBAL SCRIPTS -->
    <script>
        const API_BASE = 'http://localhost:8000';
        
        async function logout() {
            try { await fetch(API_BASE + '/api/auth/signout', { method: 'POST' }); } catch(e) {}
            window.location.href = '/signin.html';
        }

        async function loadNavInfo() {
            try {
                const r = await fetch(API_BASE + '/api/profile');
                if (r.ok) {
                    const data = await r.json();
                    const bal = data.wallet_balance || 0;
                    document.getElementById('nav-wallet-balance').textContent = '₹' + parseFloat(bal).toFixed(0);
                    if (data.subscription_tier === 'free') {
                        document.getElementById('nav-pro-badge').textContent = '⬆ Upgrade';
                        document.getElementById('nav-pro-badge').onclick = () => location.href = '/profile.html#pricing';
                    }
                }
            } catch(e) {}
        }

        // Theme Toggle Logic
        const themeToggle = document.getElementById('theme-toggle');
        const body = document.body;
        if (localStorage.getItem('theme') === 'dark') body.classList.add('dark-mode');
        themeToggle.addEventListener('click', () => {
            body.classList.toggle('dark-mode');
            localStorage.setItem('theme', body.classList.contains('dark-mode') ? 'dark' : 'light');
        });

        document.addEventListener('DOMContentLoaded', loadNavInfo);
    </script>

    <!-- REACT HEALTH COMPONENT -->
    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        function HealthApp() {
            const [profile, setProfile] = useState({ 
                height_cm: 175, 
                weight_kg: 70, 
                age: 25, 
                fitness_goal: 'maintain' 
            });
            const [activityLevel, setActivityLevel] = useState('1.55');
            const [streak, setStreak] = useState(7);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                fetchProfile();
            }, []);

            async function fetchProfile() {
                try {
                    const r = await fetch('http://localhost:8000/api/profile');
                    if (r.ok) {
                        const d = await r.json();
                        setProfile(prev => ({
                            ...prev,
                            height_cm: d.height_cm || 175,
                            weight_kg: d.weight_kg || 70,
                            age: d.age || 25,
                            fitness_goal: d.fitness_goal || 'maintain'
                        }));
                    }
                } catch(e) {}
                setLoading(false);
            }

            const bmi = useMemo(() => {
                if (!profile.height_cm || !profile.weight_kg) return '–';
                const h = profile.height_cm / 100;
                return (profile.weight_kg / (h * h)).toFixed(1);
            }, [profile.height_cm, profile.weight_kg]);

            const bmiCategory = useMemo(() => {
                const b = parseFloat(bmi);
                if (isNaN(b)) return 'Enter measurements';
                if (b < 18.5) return 'Underweight';
                if (b < 25)   return 'Healthy ✅';
                if (b < 30)   return 'Overweight';
                return 'Obese 🔴';
            }, [bmi]);

            const bmiColorClass = useMemo(() => {
                const b = parseFloat(bmi);
                if (isNaN(b)) return '';
                if (b < 18.5 || b >= 30) return 'red';
                if (b >= 25) return 'orange';
                return 'green';
            }, [bmi]);

            const tdee = useMemo(() => {
                if (!profile.weight_kg || !profile.height_cm || !profile.age) return 2000;
                const bmr = 10 * profile.weight_kg + 6.25 * profile.height_cm - 5 * profile.age + 5;
                return Math.round(bmr * parseFloat(activityLevel));
            }, [profile, activityLevel]);

            const proteinTarget = useMemo(() => {
                if (!profile.weight_kg) return 120;
                return Math.round(profile.weight_kg * (profile.fitness_goal === 'gain_muscle' ? 2.2 : 1.6));
            }, [profile]);

            const diabetesRisk = useMemo(() => {
                const b = parseFloat(bmi);
                if (isNaN(b)) return 'Unknown';
                if (b >= 30) return 'High';
                if (b >= 25) return 'Medium';
                return 'Low';
            }, [bmi]);

            const weightForecast = useMemo(() => {
                const map = { lose_weight: '-1.5 kg', gain_muscle: '+0.8 kg', maintain: '~0 kg', improve_health: '-0.5 kg' };
                return map[profile.fitness_goal] || '~0 kg';
            }, [profile.fitness_goal]);

            async function saveHealth() {
                try {
                    await fetch('http://localhost:8000/api/profile', {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            height_cm: parseFloat(profile.height_cm),
                            weight_kg: parseFloat(profile.weight_kg),
                            age: parseInt(profile.age),
                            fitness_goal: profile.fitness_goal
                        })
                    });
                    alert('✅ Health profile saved!');
                } catch(e) {}
            }

            // Dummy History
            const weekHistory = [
                { label: 'Mon', score: 62 }, { label: 'Tue', score: 78 },
                { label: 'Wed', score: 55 }, { label: 'Thu', score: 85 },
                { label: 'Fri', score: 71 }, { label: 'Sat', score: 43 },
                { label: 'Sun', score: 88 }
            ];

            const macros = {
                calories: { current: 1240, target: tdee },
                protein:  { current: 68, target: proteinTarget },
                carbs:    { current: 145, target: Math.round(tdee * 0.5 / 4) },
                fat:      { current: 38, target: Math.round(tdee * 0.3 / 9) }
            };

            return (
                <div>
                    <div style={{background: 'var(--surface-low)', borderBottom: '1px solid var(--outline-variant)', padding: '32px 0'}}>
                        <div className="container">
                            <span className="section-tag">🧬 Bio-Sync Intelligence</span>
                            <div style={{display: 'flex', alignItems: 'flex-end', justifyContent: 'space-between', flexWrap: 'wrap', gap: '16px'}}>
                                <h1 className="section-title">Your Health <span style={{color:'var(--secondary)'}}>Command Center</span></h1>
                                <div style={{display: 'flex', gap: '10px'}}>
                                    <span className="badge badge-health">🔥 {streak} day streak</span>
                                    <button className="btn btn-primary btn-sm" onClick={() => location.href='/menu.html'}>🍽️ Eat Smart Now</button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div className="container section-sm">
                        <div className="grid-4" style={{marginBottom: '32px'}}>
                            <div className="stat-widget">
                                <div className="stat-label">Body Mass Index</div>
                                <div className={`stat-value ${bmiColorClass}`}>{bmi}</div>
                                <div style={{fontSize: '0.78rem', marginTop: '4px', color: bmiColorClass === 'green' ? 'var(--secondary)' : bmiColorClass === 'orange' ? 'var(--primary)' : 'var(--error)'}}>
                                    {bmiCategory}
                                </div>
                            </div>
                            <div className="stat-widget">
                                <div className="stat-label">Daily Energy (TDEE)</div>
                                <div className="stat-value orange">{tdee} kcal</div>
                                <div style={{fontSize: '0.78rem', color: 'var(--on-surface-dim)', marginTop: '4px'}}>Your maintenance calories</div>
                            </div>
                            <div className="stat-widget">
                                <div className="stat-label">Protein Target</div>
                                <div className="stat-value green">{macros.protein.target}g</div>
                                <div style={{fontSize: '0.78rem', color: 'var(--on-surface-dim)', marginTop: '4px'}}>per day for your goal</div>
                            </div>
                            <div className="stat-widget">
                                <div className="stat-label">Diabetes Risk</div>
                                <div className="stat-value" style={{color: diabetesRisk === 'High' ? 'var(--error)' : diabetesRisk === 'Medium' ? '#FFD700' : 'var(--secondary)'}}>
                                    {diabetesRisk}
                                </div>
                                <div style={{fontSize: '0.78rem', color: 'var(--on-surface-dim)', marginTop: '4px'}}>
                                    {diabetesRisk === 'Low' ? '✅ Within safe range' : '⚠️ Monitor sugar intake'}
                                </div>
                            </div>
                        </div>

                        <div style={{display: 'grid', gridTemplateColumns: '1fr 380px', gap: '32px'}}>
                            <div style={{display: 'flex', flexDirection: 'column', gap: '24px'}}>
                                <div className="card">
                                    <h3 style={{fontFamily: 'var(--font-display)', fontWeight: 700, marginBottom: '24px'}}>⚖️ BMI Gauge</h3>
                                    <div className="grid-2" style={{gap: '16px'}}>
                                        <div className="form-group">
                                            <label className="form-label">Height (cm)</label>
                                            <input className="form-input" type="number" value={profile.height_cm} onChange={e => setProfile({...profile, height_cm: e.target.value})} />
                                        </div>
                                        <div className="form-group">
                                            <label className="form-label">Weight (kg)</label>
                                            <input className="form-input" type="number" value={profile.weight_kg} onChange={e => setProfile({...profile, weight_kg: e.target.value})} />
                                        </div>
                                    </div>
                                </div>

                                <div className="card">
                                    <h3 style={{fontFamily: 'var(--font-display)', fontWeight: 700, marginBottom: '24px'}}>📊 Daily Macro Targets</h3>
                                    <div style={{display: 'flex', flexDirection: 'column', gap: '20px'}}>
                                        {Object.entries(macros).map(([key, data]) => (
                                            <div key={key}>
                                                <div style={{display: 'flex', justifyContent: 'space-between', marginBottom: '8px', textTransform:'capitalize'}}>
                                                    <span style={{fontSize: '0.875rem', fontWeight: 600}}>{key}</span>
                                                    <span style={{fontSize: '0.875rem', fontWeight: 700}}>{data.current} / {data.target}</span>
                                                </div>
                                                <div style={{height: '8px', background: 'var(--surface-highest)', borderRadius: '4px', overflow:'hidden'}}>
                                                    <div style={{height:'100%', width: Math.min((data.current/data.target*100), 100)+'%', background:'var(--primary)'}}></div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>

                            <div style={{display: 'flex', flexDirection: 'column', gap: '20px'}}>
                                <div className="card">
                                    <h3 style={{fontFamily: 'var(--font-display)', fontWeight: 700, marginBottom: '16px'}}>🧬 Quick Bio Profile</h3>
                                    <div style={{display: 'flex', flexDirection: 'column', gap: '14px'}}>
                                        <div className="form-group">
                                            <label className="form-label">Age</label>
                                            <input className="form-input" type="number" value={profile.age} onChange={e => setProfile({...profile, age: e.target.value})} />
                                        </div>
                                        <div className="form-group">
                                            <label className="form-label">Fitness Goal</label>
                                            <select className="form-input" value={profile.fitness_goal} onChange={e => setProfile({...profile, fitness_goal: e.target.value})}>
                                                <option value="lose_weight">Lose Weight</option>
                                                <option value="gain_muscle">Gain Muscle</option>
                                                <option value="maintain">Maintain</option>
                                                <option value="improve_health">Improve Health</option>
                                            </select>
                                        </div>
                                        <div className="form-group">
                                            <label className="form-label">Activity Level</label>
                                            <select className="form-input" value={activityLevel} onChange={e => setActivityLevel(e.target.value)}>
                                                <option value="1.2">Sedentary</option>
                                                <option value="1.375">Lightly Active</option>
                                                <option value="1.55">Moderately Active</option>
                                                <option value="1.725">Very Active</option>
                                            </select>
                                        </div>
                                        <button className="btn btn-primary" onClick={saveHealth}>💾 Save Health Profile</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('react-health-root'));
        root.render(<HealthApp />);
    </script>
    <!-- AI CHATBOT -->
    <script src="/static/js/ChatWidget.js" type="text/babel"></script>
</body>
</html>
