<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health Analytics — AI Smart Food OS</title>
    <meta name="description" content="Track your health metrics, macros, BMI and calorie trends with AI-powered analytics.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&family=Outfit:wght@400;500;700&family=Plus+Jakarta+Sans:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="/static/css/health.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <!-- NAVBAR -->
    <nav class="navbar">
        <div class="container">
            <a href="/index.html" class="nav-logo" id="nav-logo">
                <div class="logo-icon">🍴</div>
                AI Food <span class="logo-accent">OS</span>
            </a>

            <div class="nav-links">
                <a href="/index.html" id="nav-home">Home</a>
                <a href="/menu.html" id="nav-menu">Menu</a>
                <a href="/health.html" id="nav-health" class="active">Health</a>
                <a href="/orders.html" id="nav-orders">Orders</a>
                <a href="/profile.html" id="nav-profile">Profile</a>
            </div>

            <div class="nav-actions">
                <button class="btn-icon-circle" id="nav-settings-btn" onclick="location.href='/settings.html'" title="Settings">⚙</button>
                <button class="btn-icon-circle" id="theme-toggle" title="Toggle Theme">🌓</button>
                <div class="btn-pro" id="nav-pro-badge" onclick="location.href='/profile.html#pricing'" style="cursor: pointer;">⚡ PRO</div>
                <div class="wallet-pill" id="nav-wallet-pill" onclick="location.href='/profile.html'" style="cursor: pointer;">
                    <span>💳</span>
                    <span id="nav-wallet-balance">–</span>
                </div>
                <button class="btn-icon-circle" id="nav-logout-btn" onclick="logout()" title="Sign out" style="color: var(--on-surface);">⏻</button>
            </div>
        </div>
    </nav>

    <main id="health-root"></main>

    <!-- GLOBAL SCRIPTS -->
    <script>
        const API_BASE = 'http://localhost:8000';
        
        async function logout() {
            try { await fetch(API_BASE + '/api/auth/signout', { method: 'POST' }); } catch(e) {}
            window.location.href = '/landing.html';
        }

        async function loadNavInfo() {
            try {
                const r = await fetch(API_BASE + '/api/profile');
                if (r.ok) {
                    const data = await r.json();
                    const bal = data.wallet_balance || 0;
                    document.getElementById('nav-wallet-balance').textContent = '₹' + parseFloat(bal).toFixed(0);
                    const proBadge = document.getElementById('nav-pro-badge');
                    if (data.subscription_tier === 'free') {
                        proBadge.textContent = '⚡ Upgrade';
                        proBadge.style.background = 'var(--surface-highest)';
                        proBadge.style.color = 'var(--on-surface)';
                    } else {
                        proBadge.textContent = '⚡ PRO';
                        proBadge.style.background = 'var(--accent-pro)';
                        proBadge.style.color = '#000';
                    }
                }
            } catch(e) {}
        }

        // Theme Toggle Logic
        const themeToggle = document.getElementById('theme-toggle');
        const body = document.body;
        if (localStorage.getItem('theme') === 'dark') body.classList.add('dark-mode');
        themeToggle.addEventListener('click', () => {
            body.classList.toggle('dark-mode');
            localStorage.setItem('theme', body.classList.contains('dark-mode') ? 'dark' : 'light');
        });

        document.addEventListener('DOMContentLoaded', loadNavInfo);
    </script>

<script type="text/babel">
const { useState, useEffect, useRef, useMemo } = React;

const WEEK = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const HEALTH_SCORES = [62, 78, 55, 85, 71, 43, 88];
const CALORIE_DATA  = [1820, 2100, 1650, 2250, 1980, 2400, 1750];
const MACRO_HISTORY = {
    protein: [58, 72, 48, 88, 65, 40, 95],
    carbs:   [210, 195, 230, 185, 220, 260, 178],
    fat:     [42, 38, 51, 33, 45, 58, 30],
};

function HealthApp() {
    const [profile, setProfile] = useState({ height_cm: 175, weight_kg: 70, age: 25, fitness_goal: 'maintain' });
    const [activity, setActivity] = useState('1.55');
    const [streak] = useState(7);
    const [loading, setLoading] = useState(true);
    const [activeTab, setActiveTab] = useState('overview');
    const [saved, setSaved] = useState(false);

    const weekScoreRef = useRef(null);
    const macroDonutRef = useRef(null);
    const calLineRef    = useRef(null);
    const bmiGaugeRef   = useRef(null);
    const chartInstances = useRef({});

    useEffect(() => {
        fetch('http://localhost:8000/api/profile').then(r => r.ok ? r.json() : null).then(d => {
            if (d) setProfile(p => ({...p, height_cm: d.height_cm||175, weight_kg: d.weight_kg||70, age: d.age||25, fitness_goal: d.fitness_goal||'maintain'}));
        }).catch(()=>{}).finally(()=>setLoading(false));
    }, []);

    const bmi = useMemo(() => {
        const h = profile.height_cm / 100;
        return (profile.weight_kg / (h*h)).toFixed(1);
    }, [profile.height_cm, profile.weight_kg]);

    const bmiCat = useMemo(() => {
        const b = parseFloat(bmi);
        if (b < 18.5) return {label:'Underweight', color:'#3b82f6'};
        if (b < 25)   return {label:'Healthy ✅',  color:'#22c55e'};
        if (b < 30)   return {label:'Overweight',  color:'#f59e0b'};
        return {label:'Obese', color:'#ef4444'};
    }, [bmi]);

    const tdee = useMemo(() => {
        const bmr = 10*profile.weight_kg + 6.25*profile.height_cm - 5*profile.age + 5;
        return Math.round(bmr * parseFloat(activity));
    }, [profile, activity]);

    const proteinTarget = useMemo(() => Math.round(profile.weight_kg * (profile.fitness_goal==='gain_muscle' ? 2.2 : 1.6)), [profile]);
    const carbTarget    = useMemo(() => Math.round(tdee * 0.5 / 4), [tdee]);
    const fatTarget     = useMemo(() => Math.round(tdee * 0.3 / 9), [tdee]);

    const diabetesRisk = useMemo(() => {
        const b = parseFloat(bmi);
        if (b >= 30) return {label:'High', color:'#ef4444'};
        if (b >= 25) return {label:'Medium', color:'#f59e0b'};
        return {label:'Low', color:'#22c55e'};
    }, [bmi]);

    const macros = {
        calories: { current: 1580, target: tdee },
        protein:  { current: 68,   target: proteinTarget },
        carbs:    { current: 195,  target: carbTarget },
        fat:      { current: 42,   target: fatTarget },
    };

    function destroyChart(key) {
        if (chartInstances.current[key]) {
            chartInstances.current[key].destroy();
            delete chartInstances.current[key];
        }
    }

    useEffect(() => {
        if (loading) return;
        // Week Health Score Bar Chart
        if (weekScoreRef.current) {
            destroyChart('week');
            chartInstances.current['week'] = new Chart(weekScoreRef.current, {
                type: 'bar',
                data: {
                    labels: WEEK,
                    datasets: [{
                        label: 'Health Score',
                        data: HEALTH_SCORES,
                        backgroundColor: HEALTH_SCORES.map(s => s >= 75 ? '#22c55e' : s >= 55 ? '#f59e0b' : '#ef4444'),
                        borderRadius: 10,
                        borderSkipped: false,
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { display: false }, tooltip: { callbacks: { label: c => ` Score: ${c.raw}` } } },
                    scales: {
                        y: { min: 0, max: 100, grid: { color: 'rgba(0,0,0,0.05)' }, ticks: { font: { family: 'Poppins', size: 11 } } },
                        x: { grid: { display: false }, ticks: { font: { family: 'Poppins', size: 11 } } }
                    }
                }
            });
        }

        // Macro Donut
        if (macroDonutRef.current) {
            destroyChart('donut');
            chartInstances.current['donut'] = new Chart(macroDonutRef.current, {
                type: 'doughnut',
                data: {
                    labels: ['Protein', 'Carbs', 'Fat'],
                    datasets: [{
                        data: [macros.protein.current * 4, macros.carbs.current * 4, macros.fat.current * 9],
                        backgroundColor: ['#22c55e','#3b82f6','#f59e0b'],
                        borderWidth: 0, hoverOffset: 8
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false, cutout: '72%',
                    plugins: {
                        legend: { position: 'bottom', labels: { font: { family: 'Poppins', size: 11 }, padding: 16 } },
                        tooltip: { callbacks: { label: c => ` ${c.label}: ${c.raw} kcal` } }
                    }
                }
            });
        }

        // Calorie Line Chart
        if (calLineRef.current) {
            destroyChart('cal');
            chartInstances.current['cal'] = new Chart(calLineRef.current, {
                type: 'line',
                data: {
                    labels: WEEK,
                    datasets: [{
                        label: 'Calories',
                        data: CALORIE_DATA,
                        borderColor: '#FF6B35',
                        backgroundColor: 'rgba(255,107,53,0.08)',
                        fill: true, tension: 0.4,
                        pointBackgroundColor: '#FF6B35', pointRadius: 5, pointHoverRadius: 7,
                    }, {
                        label: `Target (${tdee})`,
                        data: WEEK.map(() => tdee),
                        borderColor: '#22c55e', borderDash: [6,4],
                        borderWidth: 2, pointRadius: 0, fill: false,
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { labels: { font: { family: 'Poppins', size: 11 } } } },
                    scales: {
                        y: { grid: { color: 'rgba(0,0,0,0.05)' }, ticks: { font: { family:'Poppins',size:11 } } },
                        x: { grid: { display: false }, ticks: { font: { family:'Poppins',size:11 } } }
                    }
                }
            });
        }

        // BMI Gauge (doughnut trick)
        if (bmiGaugeRef.current) {
            destroyChart('bmi');
            const bmiVal = Math.min(parseFloat(bmi), 40);
            const filled = ((bmiVal - 10) / 30) * 100;
            chartInstances.current['bmi'] = new Chart(bmiGaugeRef.current, {
                type: 'doughnut',
                data: {
                    datasets: [{
                        data: [filled, 100 - filled],
                        backgroundColor: [bmiCat.color, 'rgba(0,0,0,0.07)'],
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false, cutout: '78%',
                    rotation: -90, circumference: 180,
                    plugins: { legend: { display: false }, tooltip: { enabled: false } }
                }
            });
        }

        return () => { Object.keys(chartInstances.current).forEach(destroyChart); };
    }, [loading, bmi, tdee]);

    async function saveHealth() {
        try {
            await fetch('http://localhost:8000/api/profile', {
                method: 'PUT', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ height_cm: parseFloat(profile.height_cm), weight_kg: parseFloat(profile.weight_kg), age: parseInt(profile.age), fitness_goal: profile.fitness_goal })
            });
            setSaved(true);
            setTimeout(() => setSaved(false), 2500);
        } catch(e) {}
    }

    const tabs = [
        { id: 'overview', label: '📊 Overview' },
        { id: 'macros',   label: '🥗 Macros' },
        { id: 'calories', label: '🔥 Calories' },
        { id: 'profile',  label: '⚙️ My Profile' },
    ];

    return (
        <div className="h-page">
            {/* PAGE HEADER MATCHING HOME AESTHETIC */}
            <div style={{ padding: '40px 0 20px 0', backgroundColor: 'var(--bg)' }}>
                <div className="container">
                    <div style={{ color: '#795F50', fontSize: '0.8rem', fontWeight: 800, letterSpacing: '1px', textTransform: 'uppercase', marginBottom: '8px' }}>
                        🧬 Bio-Sync Intelligence
                    </div>
                    <div style={{display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: '20px'}}>
                        <h1 style={{ fontSize: '3rem', fontWeight: 800, color: '#41281A', margin: 0, letterSpacing: '-1px' }}>
                            Health <span style={{color: '#FF4500'}}>Command Center</span>
                        </h1>
                        <div className="h-hero-badges" style={{display: 'flex', gap: '8px'}}>
                            <span className="h-badge green" style={{borderRadius: '50px', padding: '6px 16px', fontSize: '0.8rem', fontWeight: 800}}>🔥 {streak} day streak</span>
                            <span className="h-badge orange" style={{borderRadius: '50px', padding: '6px 16px', fontSize: '0.8rem', fontWeight: 800}}>BMI {bmi}</span>
                        </div>
                    </div>
                </div>
            </div>

            {/* STAT CARDS */}
            <div className="h-stats-row">
                {[
                    { label: 'BMI', value: bmi, sub: bmiCat.label, color: bmiCat.color },
                    { label: 'TDEE', value: `${tdee}`, sub: 'kcal/day', color: '#FF6B35' },
                    { label: 'Protein Goal', value: `${proteinTarget}g`, sub: 'per day', color: '#22c55e' },
                    { label: 'Diabetes Risk', value: diabetesRisk.label, sub: diabetesRisk.label === 'Low' ? '✅ Safe range' : '⚠️ Monitor', color: diabetesRisk.color },
                    { label: 'Health Streak', value: `${streak}`, sub: 'days active', color: '#a78bfa' },
                ].map((s, i) => (
                    <div key={i} className="h-stat-card">
                        <div className="h-stat-label">{s.label}</div>
                        <div className="h-stat-value" style={{color: s.color}}>{s.value}</div>
                        <div className="h-stat-sub">{s.sub}</div>
                    </div>
                ))}
            </div>

            {/* TABS */}
            <div className="h-tabs-wrap">
                <div className="h-tabs">
                    {tabs.map(t => (
                        <button key={t.id} className={`h-tab ${activeTab===t.id?'active':''}`} onClick={() => setActiveTab(t.id)}>
                            {t.label}
                        </button>
                    ))}
                </div>
            </div>

            <div className="h-content">
                {/* ── OVERVIEW TAB ── */}
                {activeTab === 'overview' && (
                    <div className="h-grid-2">
                        {/* Weekly Health Score */}
                        <div className="h-card">
                            <div className="h-card-head">
                                <h3 className="h-card-title">📊 Weekly Health Score</h3>
                                <span className="h-card-avg">Avg: {Math.round(HEALTH_SCORES.reduce((a,b)=>a+b,0)/7)}</span>
                            </div>
                            <div className="h-chart-wrap" style={{height:'240px'}}>
                                <canvas ref={weekScoreRef}></canvas>
                            </div>
                            <div className="h-legend-row">
                                <span className="h-legend-dot" style={{background:'#22c55e'}}></span><span>Excellent (75+)</span>
                                <span className="h-legend-dot" style={{background:'#f59e0b'}}></span><span>Moderate (55+)</span>
                                <span className="h-legend-dot" style={{background:'#ef4444'}}></span><span>Low</span>
                            </div>
                        </div>

                        {/* BMI Gauge */}
                        <div className="h-card">
                            <div className="h-card-head">
                                <h3 className="h-card-title">⚖️ BMI Gauge</h3>
                            </div>
                            <div className="bmi-gauge-wrap">
                                <div className="h-chart-wrap" style={{height:'180px', position:'relative'}}>
                                    <canvas ref={bmiGaugeRef}></canvas>
                                    <div className="bmi-center-text">
                                        <div className="bmi-val" style={{color: bmiCat.color}}>{bmi}</div>
                                        <div className="bmi-cat">{bmiCat.label}</div>
                                    </div>
                                </div>
                                <div className="bmi-scale-row">
                                    {['Underweight\n<18.5','Healthy\n18.5–25','Overweight\n25–30','Obese\n>30'].map((l,i) => (
                                        <div key={i} className="bmi-scale-item">
                                            <div className="bmi-scale-dot" style={{background:['#3b82f6','#22c55e','#f59e0b','#ef4444'][i]}}></div>
                                            <div className="bmi-scale-label">{l.split('\n')[0]}</div>
                                            <div className="bmi-scale-range">{l.split('\n')[1]}</div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                            <div className="bmi-inputs">
                                <div className="h-input-group">
                                    <label>Height (cm)</label>
                                    <input type="number" value={profile.height_cm} onChange={e=>setProfile({...profile,height_cm:e.target.value})} />
                                </div>
                                <div className="h-input-group">
                                    <label>Weight (kg)</label>
                                    <input type="number" value={profile.weight_kg} onChange={e=>setProfile({...profile,weight_kg:e.target.value})} />
                                </div>
                            </div>
                        </div>
                    </div>
                )}

                {/* ── MACROS TAB ── */}
                {activeTab === 'macros' && (
                    <div className="h-grid-2">
                        <div className="h-card">
                            <h3 className="h-card-title" style={{marginBottom:'20px'}}>🍩 Today's Macro Split</h3>
                            <div className="h-chart-wrap" style={{height:'280px'}}>
                                <canvas ref={macroDonutRef}></canvas>
                            </div>
                        </div>
                        <div className="h-card">
                            <h3 className="h-card-title" style={{marginBottom:'24px'}}>📏 Macro Progress Bars</h3>
                            <div className="macro-bars">
                                {Object.entries(macros).map(([key, data]) => {
                                    const pct = Math.min(100, (data.current/data.target*100));
                                    const colors = {calories:'#FF6B35', protein:'#22c55e', carbs:'#3b82f6', fat:'#f59e0b'};
                                    const units  = {calories:'kcal', protein:'g', carbs:'g', fat:'g'};
                                    return (
                                        <div key={key} className="macro-bar-item">
                                            <div className="macro-bar-head">
                                                <span className="macro-bar-name" style={{textTransform:'capitalize'}}>{key}</span>
                                                <span className="macro-bar-val">{data.current}{units[key]} / {data.target}{units[key]}</span>
                                            </div>
                                            <div className="macro-bar-track">
                                                <div className="macro-bar-fill" style={{width:`${pct}%`, background: colors[key]}}></div>
                                            </div>
                                            <div className="macro-bar-pct">{Math.round(pct)}% of goal</div>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    </div>
                )}

                {/* ── CALORIES TAB ── */}
                {activeTab === 'calories' && (
                    <div className="h-card" style={{maxWidth:'900px', margin:'0 auto'}}>
                        <div className="h-card-head">
                            <h3 className="h-card-title">🔥 7-Day Calorie Trend</h3>
                            <span className="h-card-avg">Target: {tdee} kcal</span>
                        </div>
                        <div className="h-chart-wrap" style={{height:'320px'}}>
                            <canvas ref={calLineRef}></canvas>
                        </div>
                        <div className="cal-summary-row">
                            {[
                                {label:'Weekly Avg', val: Math.round(CALORIE_DATA.reduce((a,b)=>a+b,0)/7)+'', unit:'kcal'},
                                {label:'Best Day', val: Math.max(...CALORIE_DATA)+'', unit:'kcal'},
                                {label:'vs Target', val: (Math.round(CALORIE_DATA.reduce((a,b)=>a+b,0)/7)-tdee>0?'+':'')+(Math.round(CALORIE_DATA.reduce((a,b)=>a+b,0)/7)-tdee), unit:'kcal'},
                            ].map((s,i) => (
                                <div key={i} className="cal-summary-card">
                                    <div className="cal-summary-label">{s.label}</div>
                                    <div className="cal-summary-val">{s.val} <span>{s.unit}</span></div>
                                </div>
                            ))}
                        </div>
                    </div>
                )}

                {/* ── PROFILE TAB ── */}
                {activeTab === 'profile' && (
                    <div className="h-card profile-card">
                        <h3 className="h-card-title" style={{marginBottom:'28px'}}>🧬 Health Profile</h3>
                        <div className="h-profile-grid">
                            {[
                                {label:'Age', field:'age', type:'number'},
                                {label:'Height (cm)', field:'height_cm', type:'number'},
                                {label:'Weight (kg)', field:'weight_kg', type:'number'},
                            ].map(f => (
                                <div key={f.field} className="h-input-group">
                                    <label>{f.label}</label>
                                    <input type={f.type} value={profile[f.field]} onChange={e=>setProfile({...profile,[f.field]:e.target.value})} />
                                </div>
                            ))}
                            <div className="h-input-group">
                                <label>Fitness Goal</label>
                                <select value={profile.fitness_goal} onChange={e=>setProfile({...profile,fitness_goal:e.target.value})}>
                                    <option value="lose_weight">Lose Weight</option>
                                    <option value="gain_muscle">Gain Muscle</option>
                                    <option value="maintain">Maintain</option>
                                    <option value="improve_health">Improve Health</option>
                                </select>
                            </div>
                            <div className="h-input-group">
                                <label>Activity Level</label>
                                <select value={activity} onChange={e=>setActivity(e.target.value)}>
                                    <option value="1.2">Sedentary</option>
                                    <option value="1.375">Lightly Active</option>
                                    <option value="1.55">Moderately Active</option>
                                    <option value="1.725">Very Active</option>
                                </select>
                            </div>
                        </div>
                        <button className="h-save-btn" onClick={saveHealth}>
                            {saved ? '✅ Saved!' : '💾 Save Health Profile'}
                        </button>
                        <div className="h-results-row">
                            {[
                                {label:'BMI', val:bmi, color:bmiCat.color, sub:bmiCat.label},
                                {label:'TDEE', val:tdee+' kcal', color:'#FF6B35', sub:'Daily calories'},
                                {label:'Protein', val:proteinTarget+'g', color:'#22c55e', sub:'Daily target'},
                            ].map((r,i)=>(
                                <div key={i} className="h-result-card">
                                    <div className="h-result-label">{r.label}</div>
                                    <div className="h-result-val" style={{color:r.color}}>{r.val}</div>
                                    <div className="h-result-sub">{r.sub}</div>
                                </div>
                            ))}
                        </div>
                    </div>
                )}
            </div>
        </div>
    );
}

const root = ReactDOM.createRoot(document.getElementById('health-root'));
root.render(<HealthApp />);
</script>
<script src="/static/js/ChatWidget.js" type="text/babel"></script>
</body>
</html>
